<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Notes Tutor - Enrollment Requests</title>
  <style>
    :root {
      --bg: #0b1220;
      --border: rgba(255,255,255,.1);
      --text: #e8eefc;
      --muted: #aab6d6;
      --accent: #7aa2ff;
      --danger: #ff6b6b;
      --ok: #31c48d;
      --warning: #ffd166;
      --sidebar-width: 280px;
      --header-height: 64px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background:
        radial-gradient(1200px 800px at 20% 10%, rgba(122,162,255,.12), transparent 60%),
        radial-gradient(1000px 600px at 80% 30%, rgba(49,196,141,.08), transparent 50%),
        var(--bg);
      color: var(--text);
    }
    .app-container { display: flex; width: 100%; height: 100vh; overflow: hidden; }
    .sidebar {
      width: var(--sidebar-width);
      background: rgba(11,18,32,.95);
      backdrop-filter: blur(20px);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }
    .sidebar-header { padding: 24px 20px; border-bottom: 1px solid var(--border); margin-bottom: 24px; }
    .logo-area, .user-info { display: flex; align-items: center; gap: 12px; }
    .logo-icon, .user-avatar {
      background: linear-gradient(135deg, var(--accent), var(--ok));
      color: #0b1220;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
    }
    .logo-icon { width: 44px; height: 44px; border-radius: 14px; object-fit: contain; padding: 4px; background: rgba(255,255,255,.04); }
    .user-avatar { width: 40px; height: 40px; border-radius: 50%; }
    .logo-text h2 {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 2px;
      background: linear-gradient(135deg, #fff, var(--accent));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .logo-text p, .user-role { color: var(--muted); font-size: 11px; }
    .nav-section { flex: 1; overflow-y: auto; padding: 0 16px; }
    .nav-section-title {
      padding: 16px 12px 8px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 14px;
      width: 100%;
      padding: 12px 16px;
      margin-bottom: 4px;
      border: 0;
      border-radius: 12px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      text-align: left;
    }
    .nav-item:hover { background: rgba(255,255,255,.06); color: var(--text); }
    .nav-item.active {
      background: linear-gradient(135deg, rgba(122,162,255,.15), rgba(49,196,141,.08));
      color: var(--accent);
      border-left: 3px solid var(--accent);
    }
    .nav-icon { width: 28px; text-align: center; font-size: 12px; }
    .sidebar-footer { padding: 20px; border-top: 1px solid var(--border); margin-top: auto; }
    .user-info { margin-bottom: 16px; }
    .user-name { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
    .sign-out-btn {
      width: 100%;
      padding: 10px;
      border: 1px solid rgba(255,107,107,.2);
      border-radius: 10px;
      background: rgba(255,107,107,.1);
      color: var(--danger);
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
    }
    .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .top-bar {
      height: var(--header-height);
      padding: 0 24px;
      background: rgba(11,18,32,.8);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    .page-title {
      font-size: 20px;
      font-weight: 600;
      background: linear-gradient(135deg, #fff, var(--accent));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .top-actions { display: flex; align-items: center; gap: 12px; }
    .filter-select {
      min-width: 150px;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: rgba(0,0,0,.3);
      color: var(--text);
      outline: 0;
    }
    .content-area { flex: 1; overflow-y: auto; padding: 24px; }
    .container { max-width: 1400px; margin: 0 auto; }
    .card {
      margin-bottom: 24px;
      padding: 24px;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: rgba(255,255,255,.04);
      backdrop-filter: blur(10px);
    }
    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }
    .card-header h2 { font-size: 18px; font-weight: 600; }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 18px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: rgba(255,255,255,.06);
      color: var(--text);
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
    }
    .btn:hover { background: rgba(255,255,255,.12); }
    .btn-primary { border: 0; background: linear-gradient(135deg, var(--accent), var(--ok)); color: #0b1220; font-weight: 600; }
    .btn-danger { border-color: rgba(255,107,107,.3); background: rgba(255,107,107,.15); color: var(--danger); }
    .btn-ghost { border: 0; background: transparent; }
    .btn-sm { padding: 6px 12px; border-radius: 8px; font-size: 12px; }
    .status-text { color: var(--muted); font-size: 13px; }
    .table-wrapper { overflow-x: auto; margin-top: 20px; border: 1px solid var(--border); border-radius: 16px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 14px 16px; border-bottom: 1px solid var(--border); text-align: left; }
    th {
      background: rgba(0,0,0,.2);
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .5px;
    }
    td { font-size: 13px; }
    tr:hover td { background: rgba(255,255,255,.03); }
    .actions-cell, td:last-child, th:last-child { text-align: right; white-space: nowrap; }
    .badge { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
    .badge-success { border: 1px solid rgba(49,196,141,.3); background: rgba(49,196,141,.15); color: var(--ok); }
    .badge-danger { border: 1px solid rgba(255,107,107,.3); background: rgba(255,107,107,.15); color: var(--danger); }
    .badge-warning { border: 1px solid rgba(255,209,102,.3); background: rgba(255,209,102,.15); color: var(--warning); }
    .debug-box { margin-top: 24px; overflow: hidden; border: 1px solid var(--border); border-radius: 16px; }
    .debug-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      background: rgba(255,255,255,.04);
    }
    .debug-content {
      max-height: 200px;
      overflow: auto;
      padding: 16px;
      background: rgba(0,0,0,.3);
      font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
      font-size: 12px;
    }
    @media (max-width: 768px) {
      .sidebar { position: fixed; left: -280px; top: 0; height: 100%; }
      .top-actions { width: 100%; justify-content: flex-end; }
    }
    body.embedded {
      background: transparent;
    }
    body.embedded .sidebar,
    body.embedded .top-bar {
      display: none;
    }
    body.embedded .app-container {
      display: block;
      height: auto;
      min-height: 100%;
      overflow: visible;
    }
    body.embedded .main-content {
      display: block;
      min-height: 100%;
      overflow: visible;
    }
    body.embedded .content-area {
      padding: 0;
      overflow: visible;
    }
  </style>
</head>
<body>
  <div class="app-container">
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="logo-area">
          <img class="logo-icon" src="../../assets/logo.png" alt="SkillFind AI logo" />
          <div class="logo-text">
            <h2>SkillFind AI</h2>
            <p>Admin Dashboard</p>
          </div>
        </div>
      </div>

      <div class="nav-section">
        <div class="nav-section-title">Main</div>
        <button class="nav-item" data-page="admin.html"><span class="nav-icon">CRS</span><span>Courses</span></button>
        <button class="nav-item" data-page="module.html"><span class="nav-icon">MOD</span><span>Modules</span></button>
        <button class="nav-item" data-page="module-guide.html"><span class="nav-icon">GUI</span><span>Module Guides</span></button>
        <button class="nav-item" data-page="admin.html"><span class="nav-icon">EXM</span><span>Exams & Tests</span></button>

        <div class="nav-section-title">Management</div>
        <button class="nav-item active" data-page="request.html"><span class="nav-icon">REQ</span><span>Enrollment Requests</span></button>
        <button class="nav-item" data-page="chapter.html"><span class="nav-icon">CH</span><span>Chapters</span></button>
        <button class="nav-item" data-page="students.html"><span class="nav-icon">STU</span><span>Students</span></button>
      </div>

      <div class="sidebar-footer">
        <div class="user-info">
          <div class="user-avatar">A</div>
          <div>
            <div class="user-name" id="userName">Admin</div>
            <div class="user-role">Administrator</div>
          </div>
        </div>
        <button id="btnSignOut" class="sign-out-btn">Sign Out</button>
      </div>
    </aside>

    <main class="main-content">
      <div class="top-bar">
        <h1 class="page-title">Enrollment Requests</h1>
        <div class="top-actions">
          <select id="reqStatusFilter" class="filter-select">
            <option value="pending">Pending</option>
            <option value="approved">Approved</option>
            <option value="rejected">Rejected</option>
            <option value="">All</option>
          </select>
          <button id="btnReloadRequests" class="btn btn-ghost">Reload</button>
        </div>
      </div>

      <div class="content-area">
        <div class="container">
          <div class="card">
            <div class="card-header">
              <h2>Enrollment Requests</h2>
              <div id="requestsStatus" class="status-text"></div>
            </div>

            <div class="table-wrapper">
              <table id="requestsTable">
                <thead>
                  <tr>
                    <th>Student</th>
                    <th>Course</th>
                    <th>Module</th>
                    <th>Status</th>
                    <th>Requested</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody>
                  <tr><td colspan="6" style="text-align:center; padding:40px;">Loading requests...</td></tr>
                </tbody>
              </table>
            </div>
          </div>

          <div class="debug-box">
            <div class="debug-header">
              <span>Debug Console</span>
              <button id="btnClearDebug" class="btn btn-ghost">Clear</button>
            </div>
            <pre id="debug" class="debug-content"></pre>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script>
    if (window.self !== window.top) {
      document.body.classList.add("embedded");
    }

    const CFG = window.APP_CONFIG || {};
    const API_BASE = `${CFG.API_BASE}/admin`;
    const SUPABASE_URL = CFG.SUPABASE_URL;
    const SUPABASE_ANON_KEY = CFG.SUPABASE_ANON_KEY;

    if (!SUPABASE_URL || !SUPABASE_ANON_KEY) {
      document.body.innerHTML = '<div style="padding:40px;text-align:center;color:#721c24;background:#f8d7da;">Configuration Error: Missing Supabase config.</div>';
    }

    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const reqStatusFilter = document.getElementById("reqStatusFilter");
    const btnReloadRequests = document.getElementById("btnReloadRequests");
    const requestsStatus = document.getElementById("requestsStatus");
    const requestsTable = document.querySelector("#requestsTable tbody");
    const btnSignOut = document.getElementById("btnSignOut");
    const btnClearDebug = document.getElementById("btnClearDebug");
    const debug = document.getElementById("debug");
    const userName = document.getElementById("userName");

    function setText(node, text) {
      if (node) node.textContent = text || "";
    }

    function logDebug(value) {
      if (!debug) return;
      debug.textContent = typeof value === "string" ? value : JSON.stringify(value, null, 2);
    }

    function escapeHtml(str) {
      return String(str || "").replace(/[&<>]/g, function(m) {
        if (m === "&") return "&amp;";
        if (m === "<") return "&lt;";
        if (m === ">") return "&gt;";
        return m;
      });
    }

    function escapeAttr(str) {
      return String(str || "").replace(/&/g, "&amp;").replace(/"/g, "&quot;");
    }

    function fmtDate(iso) {
      if (!iso) return "";
      try { return new Date(iso).toLocaleString(); } catch { return iso; }
    }

    function statusBadge(status) {
      const s = String(status || "").toLowerCase();
      const cls = s === "approved" ? "badge-success" : s === "rejected" ? "badge-danger" : "badge-warning";
      return `<span class="badge ${cls}">${escapeHtml(status || "")}</span>`;
    }

    async function getAccessToken() {
      const adminSession = localStorage.getItem("adminSession");
      if (adminSession) {
        try {
          const session = JSON.parse(adminSession);
          if (session?.access_token) return session.access_token;
        } catch (e) {}
      }
      const { data, error } = await sb.auth.getSession();
      if (error) throw error;
      return data?.session?.access_token || "";
    }

    async function apiFetch(path, opts = {}) {
      const token = await getAccessToken();
      const headers = { ...(opts.headers || {}) };
      if (!headers["Content-Type"] && opts.body && !(opts.body instanceof FormData)) {
        headers["Content-Type"] = "application/json";
      }
      if (token) headers.Authorization = `Bearer ${token}`;
      const res = await fetch(`${API_BASE}${path}`, { ...opts, headers });
      const text = await res.text();
      let json;
      try { json = JSON.parse(text); } catch { json = { raw: text }; }
      if (!res.ok) throw new Error(json?.message || json?.error || `HTTP ${res.status}`);
      return json;
    }

    function renderEmpty(message) {
      requestsTable.innerHTML = `<tr><td colspan="6" style="text-align:center; padding:40px;">${escapeHtml(message)}</td></tr>`;
    }

    function renderRequests(rows) {
      if (!rows.length) {
        renderEmpty("No enrollment requests found.");
        return;
      }

      requestsTable.innerHTML = "";
      for (const request of rows) {
        const isPending = request.status === "pending";
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${escapeHtml(request.student_name || request.student_id || "")}</td>
          <td>${escapeHtml(request.course_name || "")}</td>
          <td>${escapeHtml(request.module_name || "")}</td>
          <td>${statusBadge(request.status)}</td>
          <td>${fmtDate(request.created_at)}</td>
          <td class="actions-cell">
            ${isPending ? `
              <button class="btn btn-primary btn-sm approve-request" data-id="${escapeAttr(request.id)}">Approve</button>
              <button class="btn btn-danger btn-sm reject-request" data-id="${escapeAttr(request.id)}">Reject</button>
            ` : ""}
          </td>
        `;
        requestsTable.appendChild(tr);
      }

      document.querySelectorAll(".approve-request").forEach((btn) => {
        btn.addEventListener("click", async () => {
          try {
            setText(requestsStatus, "Approving request...");
            await apiFetch(`/enrollment-requests/${btn.dataset.id}/approve`, { method: "POST" });
            await loadRequests();
          } catch (error) {
            setText(requestsStatus, `Approve failed: ${error.message}`);
            logDebug({ error: error.message, stack: error.stack });
          }
        });
      });

      document.querySelectorAll(".reject-request").forEach((btn) => {
        btn.addEventListener("click", async () => {
          try {
            setText(requestsStatus, "Rejecting request...");
            await apiFetch(`/enrollment-requests/${btn.dataset.id}/reject`, { method: "POST" });
            await loadRequests();
          } catch (error) {
            setText(requestsStatus, `Reject failed: ${error.message}`);
            logDebug({ error: error.message, stack: error.stack });
          }
        });
      });
    }

    async function loadRequests() {
      const status = reqStatusFilter.value;
      const q = status ? `?status=${encodeURIComponent(status)}` : "";
      setText(requestsStatus, "Loading requests...");
      const data = await apiFetch(`/enrollment-requests${q}`);
      renderRequests(data.requests || []);
      setText(requestsStatus, "");
    }

    async function checkAuth() {
      const adminSession = localStorage.getItem("adminSession");
      if (adminSession) {
        try {
          const session = JSON.parse(adminSession);
          if (session?.access_token && session?.refresh_token) {
            await sb.auth.setSession({
              access_token: session.access_token,
              refresh_token: session.refresh_token
            });
          }
        } catch (e) {}
      }

      const { data } = await sb.auth.getUser();
      if (!data?.user) {
        window.location.href = "adminlogin.html";
        return false;
      }
      if (userName) userName.textContent = data.user.email?.split("@")[0] || "Admin";
      return true;
    }

    document.querySelectorAll(".nav-item").forEach((btn) => {
      btn.addEventListener("click", () => {
        const page = btn.dataset.page;
        if (page) window.location.href = page;
      });
    });

    reqStatusFilter?.addEventListener("change", async () => {
      try { await loadRequests(); } catch (error) {
        setText(requestsStatus, `Load failed: ${error.message}`);
        logDebug({ error: error.message, stack: error.stack });
      }
    });

    btnReloadRequests?.addEventListener("click", async () => {
      try { await loadRequests(); } catch (error) {
        setText(requestsStatus, `Reload failed: ${error.message}`);
        logDebug({ error: error.message, stack: error.stack });
      }
    });

    btnClearDebug?.addEventListener("click", () => logDebug(""));
    btnSignOut?.addEventListener("click", async () => {
      await sb.auth.signOut();
      localStorage.removeItem("adminSession");
      window.location.href = "adminlogin.html";
    });

    async function init() {
      const ok = await checkAuth();
      if (!ok) return;
      await loadRequests();
    }

    init().catch((error) => {
      setText(requestsStatus, `Startup failed: ${error.message}`);
      logDebug({ error: error.message, stack: error.stack });
    });
  </script>
</body>
</html>
