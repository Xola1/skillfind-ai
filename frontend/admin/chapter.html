<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Notes Tutor - Chapters</title>
  <style>
    :root {
      --bg: #0b1220;
      --border: rgba(255,255,255,.1);
      --text: #e8eefc;
      --muted: #aab6d6;
      --accent: #7aa2ff;
      --accent-glow: rgba(122,162,255,.3);
      --danger: #ff6b6b;
      --ok: #31c48d;
      --warning: #ffd166;
      --sidebar-width: 280px;
      --header-height: 64px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background:
        radial-gradient(1200px 800px at 20% 10%, rgba(122,162,255,.12), transparent 60%),
        radial-gradient(1000px 600px at 80% 30%, rgba(49,196,141,.08), transparent 50%),
        var(--bg);
      color: var(--text);
    }

    .app-container {
      display: flex;
      height: 100vh;
      width: 100%;
      overflow: hidden;
    }

    .sidebar {
      width: var(--sidebar-width);
      background: rgba(11,18,32,.95);
      backdrop-filter: blur(20px);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      z-index: 100;
    }

    .sidebar-header {
      padding: 24px 20px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 24px;
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      width: 44px;
      height: 44px;
      background: rgba(255,255,255,.04);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      object-fit: contain;
      padding: 4px;
      box-shadow: 0 4px 12px var(--accent-glow);
    }

    .logo-text h2 {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 2px;
      background: linear-gradient(135deg, #fff, var(--accent));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .logo-text p {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: .5px;
    }

    .nav-section {
      flex: 1;
      overflow-y: auto;
      padding: 0 16px;
    }

    .nav-section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      padding: 16px 12px 8px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 14px;
      width: 100%;
      padding: 12px 16px;
      margin-bottom: 4px;
      border-radius: 12px;
      border: 0;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      text-align: left;
      transition: all .2s ease;
    }

    .nav-item:hover {
      background: rgba(255,255,255,.06);
      color: var(--text);
    }

    .nav-item.active {
      background: linear-gradient(135deg, rgba(122,162,255,.15), rgba(49,196,141,.08));
      color: var(--accent);
      border-left: 3px solid var(--accent);
    }

    .nav-icon {
      width: 28px;
      text-align: center;
      font-size: 16px;
    }

    .sidebar-footer {
      padding: 20px;
      border-top: 1px solid var(--border);
      margin-top: auto;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .user-avatar {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--accent), var(--ok));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      color: #0b1220;
    }

    .user-name {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 2px;
    }

    .user-role {
      font-size: 11px;
      color: var(--muted);
    }

    .sign-out-btn {
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid rgba(255,107,107,.2);
      background: rgba(255,107,107,.1);
      color: var(--danger);
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
    }

    .sign-out-btn:hover {
      background: rgba(255,107,107,.2);
      border-color: rgba(255,107,107,.4);
    }

    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .top-bar {
      height: var(--header-height);
      padding: 0 24px;
      background: rgba(11,18,32,.8);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .page-title {
      font-size: 20px;
      font-weight: 600;
      background: linear-gradient(135deg, #fff, var(--accent));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .search-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: rgba(0,0,0,.22);
    }

    .search-bar input {
      width: 220px;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--text);
      font-size: 13px;
    }

    .content-area {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    .card {
      margin-bottom: 24px;
      padding: 24px;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: rgba(255,255,255,.04);
      backdrop-filter: blur(10px);
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .card-header h2 {
      font-size: 18px;
      font-weight: 600;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 20px;
      margin-bottom: 20px;
    }

    .form-field label {
      display: block;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 500;
    }

    .form-field input,
    .form-field select {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 12px;
      outline: 0;
      background: rgba(0,0,0,.3);
      color: var(--text);
      font-size: 14px;
    }

    .form-field input:focus,
    .form-field select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(122,162,255,.1);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 18px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: rgba(255,255,255,.06);
      color: var(--text);
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: all .2s;
    }

    .btn:hover {
      background: rgba(255,255,255,.12);
      transform: translateY(-1px);
    }

    .btn-primary {
      border: 0;
      background: linear-gradient(135deg, var(--accent), var(--ok));
      color: #0b1220;
      font-weight: 600;
    }

    .btn-danger {
      border-color: rgba(255,107,107,.3);
      background: rgba(255,107,107,.15);
      color: var(--danger);
    }

    .btn-ghost {
      border: 0;
      background: transparent;
    }

    .btn-sm {
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 12px;
    }

    .action-buttons {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    .status-text {
      color: var(--muted);
      font-size: 13px;
    }

    .table-wrapper {
      overflow-x: auto;
      margin-top: 20px;
      border: 1px solid var(--border);
      border-radius: 16px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      text-align: left;
    }

    th {
      background: rgba(0,0,0,.2);
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .5px;
    }

    td {
      font-size: 13px;
    }

    tr:hover td {
      background: rgba(255,255,255,.03);
    }

    .actions-cell,
    td:last-child,
    th:last-child {
      text-align: right;
      white-space: nowrap;
    }

    .badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
    }

    .badge-success {
      border: 1px solid rgba(49,196,141,.3);
      background: rgba(49,196,141,.15);
      color: var(--ok);
    }

    .badge-warning {
      border: 1px solid rgba(255,209,102,.3);
      background: rgba(255,209,102,.15);
      color: var(--warning);
    }

    .debug-box {
      margin-top: 24px;
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: 16px;
    }

    .debug-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      background: rgba(255,255,255,.04);
    }

    .debug-content {
      max-height: 200px;
      overflow: auto;
      padding: 16px;
      background: rgba(0,0,0,.3);
      font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
      font-size: 12px;
    }

    @media (max-width: 768px) {
      .sidebar {
        position: fixed;
        left: -280px;
        top: 0;
        height: 100%;
      }

      .search-bar input {
        width: 120px;
      }
    }
    body.embedded {
      background: transparent;
    }
    body.embedded .sidebar,
    body.embedded .top-bar {
      display: none;
    }
    body.embedded .app-container {
      display: block;
      height: auto;
      min-height: 100%;
      overflow: visible;
    }
    body.embedded .main-content {
      display: block;
      min-height: 100%;
      overflow: visible;
    }
    body.embedded .content-area {
      padding: 0;
      overflow: visible;
    }
  </style>
</head>
<body>
  <div class="app-container">
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="logo-area">
          <img class="logo-icon" src="../../assets/logo.png" alt="SkillFind AI logo" />
          <div class="logo-text">
            <h2>SkillFind AI</h2>
            <p>Admin Dashboard</p>
          </div>
        </div>
      </div>

      <div class="nav-section">
        <div class="nav-section-title">Main</div>
        <button class="nav-item" data-page="admin.html">
          <span class="nav-icon">CRS</span>
          <span>Courses</span>
        </button>
        <button class="nav-item" data-page="module.html">
          <span class="nav-icon">MOD</span>
          <span>Modules</span>
        </button>
        <button class="nav-item" data-page="module-guide.html">
          <span class="nav-icon">GUI</span>
          <span>Module Guides</span>
        </button>
        <button class="nav-item" data-page="admin.html">
          <span class="nav-icon">EXM</span>
          <span>Exams & Tests</span>
        </button>

        <div class="nav-section-title">Management</div>
        <button class="nav-item" data-page="request.html">
          <span class="nav-icon">REQ</span>
          <span>Enrollment Requests</span>
        </button>
        <button class="nav-item active" data-page="chapter.html">
          <span class="nav-icon">CH</span>
          <span>Chapters</span>
        </button>
        <button class="nav-item" data-page="students.html">
          <span class="nav-icon">STU</span>
          <span>Students</span>
        </button>
      </div>

      <div class="sidebar-footer">
        <div class="user-info">
          <div class="user-avatar">A</div>
          <div>
            <div class="user-name" id="userName">Admin</div>
            <div class="user-role">Administrator</div>
          </div>
        </div>
        <button id="btnSignOut" class="sign-out-btn">Sign Out</button>
      </div>
    </aside>

    <main class="main-content">
      <div class="top-bar">
        <h1 class="page-title">Chapters</h1>
        <div class="search-bar">
          <span>Search</span>
          <input type="text" placeholder="Filter chapters..." id="searchInput" />
        </div>
      </div>

      <div class="content-area">
        <div class="container">
          <div class="card">
            <div class="card-header">
              <h2>Chapters</h2>
              <button id="btnReloadChapters" class="btn btn-ghost">Reload</button>
            </div>

            <div class="form-grid">
              <div class="form-field">
                <label>Select Course</label>
                <select id="chaptersCourseSelect">
                  <option value="">Loading courses...</option>
                </select>
              </div>
              <div class="form-field">
                <label>Select Module</label>
                <select id="chaptersModuleSelect">
                  <option value="">Select a course first</option>
                </select>
              </div>
              <div class="form-field">
                <label>Chapter Number</label>
                <input id="chapterNumber" type="number" placeholder="e.g. 3" />
              </div>
              <div class="form-field">
                <label>Chapter Title</label>
                <input id="chapterTitle" placeholder="e.g. Logic Circuits" />
              </div>
              <div class="form-field">
                <label>Upload PDF/Image</label>
                <input id="chapterFile" type="file" accept=".pdf,image/*" />
              </div>
              <div class="form-field">
                <label>PDF Password</label>
                <input id="pdfPassword" placeholder="If PDF is locked" />
              </div>
            </div>

            <div class="action-buttons">
              <button id="btnUploadChapter" class="btn btn-primary">Upload Chapter</button>
              <div id="chaptersStatus" class="status-text"></div>
            </div>

            <div class="table-wrapper">
              <table id="chaptersTable">
                <thead>
                  <tr>
                    <th>Module</th>
                    <th>#</th>
                    <th>Title</th>
                    <th>Chunks</th>
                    <th>Method</th>
                    <th>Created</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody>
                  <tr>
                    <td colspan="7" style="text-align:center; padding:40px;">Loading chapters...</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>

          <div class="debug-box">
            <div class="debug-header">
              <span>Debug Console</span>
              <button id="btnClearDebug" class="btn btn-ghost">Clear</button>
            </div>
            <pre id="debug" class="debug-content"></pre>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script>
    if (window.self !== window.top) {
      document.body.classList.add("embedded");
    }

    const CFG = window.APP_CONFIG || {};
    const API_BASE = `${CFG.API_BASE}/admin`;
    const SUPABASE_URL = CFG.SUPABASE_URL;
    const SUPABASE_ANON_KEY = CFG.SUPABASE_ANON_KEY;

    if (!SUPABASE_URL || !SUPABASE_ANON_KEY) {
      document.body.innerHTML = '<div style="padding:40px;text-align:center;color:#721c24;background:#f8d7da;">Configuration Error: Missing Supabase config.</div>';
    }

    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const chaptersCourseSelect = document.getElementById("chaptersCourseSelect");
    const chaptersModuleSelect = document.getElementById("chaptersModuleSelect");
    const chapterNumber = document.getElementById("chapterNumber");
    const chapterTitle = document.getElementById("chapterTitle");
    const chapterFile = document.getElementById("chapterFile");
    const pdfPassword = document.getElementById("pdfPassword");
    const btnUploadChapter = document.getElementById("btnUploadChapter");
    const btnReloadChapters = document.getElementById("btnReloadChapters");
    const btnSignOut = document.getElementById("btnSignOut");
    const btnClearDebug = document.getElementById("btnClearDebug");
    const chaptersStatus = document.getElementById("chaptersStatus");
    const chaptersTable = document.querySelector("#chaptersTable tbody");
    const debug = document.getElementById("debug");
    const userName = document.getElementById("userName");
    const searchInput = document.getElementById("searchInput");

    let courses = [];
    let modules = [];
    let chapters = [];

    function setStatus(text) {
      if (chaptersStatus) chaptersStatus.textContent = text || "";
    }

    function logDebug(value) {
      if (!debug) return;
      debug.textContent = typeof value === "string" ? value : JSON.stringify(value, null, 2);
    }

    function escapeHtml(str) {
      return String(str || "").replace(/[&<>]/g, function(m) {
        if (m === "&") return "&amp;";
        if (m === "<") return "&lt;";
        if (m === ">") return "&gt;";
        return m;
      });
    }

    function escapeAttr(str) {
      return String(str || "").replace(/&/g, "&amp;").replace(/"/g, "&quot;");
    }

    function fmtDate(iso) {
      if (!iso) return "";
      try { return new Date(iso).toLocaleString(); } catch { return iso; }
    }

    async function getAccessToken() {
      const adminSession = localStorage.getItem("adminSession");
      if (adminSession) {
        try {
          const session = JSON.parse(adminSession);
          if (session?.access_token) return session.access_token;
        } catch (e) {}
      }
      const { data, error } = await sb.auth.getSession();
      if (error) throw error;
      return data?.session?.access_token || "";
    }

    async function apiFetch(path, opts = {}) {
      const token = await getAccessToken();
      const headers = { ...(opts.headers || {}) };
      if (!headers["Content-Type"] && opts.body && !(opts.body instanceof FormData)) {
        headers["Content-Type"] = "application/json";
      }
      if (token) headers.Authorization = `Bearer ${token}`;

      const res = await fetch(`${API_BASE}${path}`, { ...opts, headers });
      const text = await res.text();
      let json;
      try { json = JSON.parse(text); } catch { json = { raw: text }; }
      if (!res.ok) throw new Error(json?.message || json?.error || `HTTP ${res.status}`);
      return json;
    }

    function renderEmpty(message) {
      if (!chaptersTable) return;
      chaptersTable.innerHTML = `<tr><td colspan="7" style="text-align:center; padding:40px;">${escapeHtml(message)}</td></tr>`;
    }

    function renderChapters(rows) {
      if (!chaptersTable) return;
      if (!rows.length) {
        renderEmpty("No chapters found.");
        return;
      }

      chaptersTable.innerHTML = "";
      for (const ch of rows) {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${escapeHtml(ch.module_name || "")}</td>
          <td>${ch.chapter_number ?? ""}</td>
          <td>${escapeHtml(ch.chapter_title || "")}</td>
          <td>${ch.chunk_count ?? 0}</td>
          <td>${escapeHtml(ch.method || "")}</td>
          <td>${fmtDate(ch.created_at)}</td>
          <td class="actions-cell">
            <button class="btn btn-danger btn-sm delete-chapter" data-id="${escapeAttr(ch.chapter_id)}" data-title="${escapeAttr(ch.chapter_title)}">Delete</button>
          </td>
        `;
        chaptersTable.appendChild(tr);
      }

      document.querySelectorAll(".delete-chapter").forEach((btn) => {
        btn.addEventListener("click", async () => {
          if (!confirm(`Delete chapter "${btn.dataset.title}"? This will delete all chunks, progress, and related questions.`)) return;
          try {
            setStatus("Deleting...");
            await apiFetch(`/chapters/${btn.dataset.id}`, { method: "DELETE" });
            setStatus("Chapter deleted.");
            await loadChapters(chaptersModuleSelect.value || "");
          } catch (error) {
            setStatus(`Delete failed: ${error.message}`);
            logDebug({ error: error.message, stack: error.stack });
          }
        });
      });
    }

    function filterChapters() {
      const term = (searchInput?.value || "").toLowerCase();
      if (!term) {
        renderChapters(chapters);
        return;
      }
      renderChapters(chapters.filter((ch) =>
        (ch.module_name || "").toLowerCase().includes(term) ||
        (ch.chapter_title || "").toLowerCase().includes(term) ||
        String(ch.chapter_number ?? "").includes(term) ||
        (ch.method || "").toLowerCase().includes(term)
      ));
    }

    async function loadCourses() {
      const data = await apiFetch("/courses");
      courses = data.courses || [];
      chaptersCourseSelect.innerHTML = '<option value="">Select course...</option>';
      for (const course of courses) {
        const opt = document.createElement("option");
        opt.value = course.id;
        opt.textContent = `${course.name}${course.code ? ` (${course.code})` : ""}`;
        chaptersCourseSelect.appendChild(opt);
      }
      return courses;
    }

    async function loadModules(courseId = "") {
      if (!courseId) {
        modules = [];
        chaptersModuleSelect.innerHTML = '<option value="">Select a course first</option>';
        return [];
      }

      chaptersModuleSelect.innerHTML = '<option value="">Loading modules...</option>';
      const data = await apiFetch(`/modules?courseId=${encodeURIComponent(courseId)}`);
      modules = data.modules || [];
      chaptersModuleSelect.innerHTML = '<option value="">Select module...</option>';
      for (const module of modules) {
        const opt = document.createElement("option");
        opt.value = module.id;
        opt.textContent = module.name;
        chaptersModuleSelect.appendChild(opt);
      }
      return modules;
    }

    async function loadChapters(moduleId = "") {
      const q = moduleId ? `?moduleId=${encodeURIComponent(moduleId)}` : "";
      const data = await apiFetch(`/chapters${q}`);
      chapters = data.chapters || [];
      filterChapters();
      return chapters;
    }

    async function uploadChapter() {
      const moduleId = chaptersModuleSelect.value;
      const title = chapterTitle.value.trim();
      const file = chapterFile.files?.[0];

      if (!moduleId || !title || !file) {
        setStatus("Please fill all required fields.");
        return;
      }

      setStatus("Uploading and extracting text...");
      const fd = new FormData();
      fd.append("moduleId", moduleId);
      fd.append("chapterTitle", title);
      if (chapterNumber.value) fd.append("chapterNumber", chapterNumber.value);
      if (pdfPassword.value) fd.append("pdfPassword", pdfPassword.value);
      fd.append("file", file);

      const token = await getAccessToken();
      const res = await fetch(`${API_BASE}/chapters/upload`, {
        method: "POST",
        headers: token ? { Authorization: `Bearer ${token}` } : {},
        body: fd
      });
      const json = await res.json();

      if (!res.ok || !json.ok) {
        throw new Error(json.error || "Upload failed");
      }

      setStatus(`Chapter uploaded. ${json.chunksInserted || 0} chunks inserted. ${json.questionsInserted || 0} reusable questions and answers stored.`);
      chapterTitle.value = "";
      chapterFile.value = "";
      pdfPassword.value = "";
      await loadChapters(moduleId);
    }

    async function checkAuth() {
      const adminSession = localStorage.getItem("adminSession");
      if (adminSession) {
        try {
          const session = JSON.parse(adminSession);
          if (session?.access_token && session?.refresh_token) {
            await sb.auth.setSession({
              access_token: session.access_token,
              refresh_token: session.refresh_token
            });
          }
        } catch (e) {}
      }

      const { data } = await sb.auth.getUser();
      if (!data?.user) {
        window.location.href = "adminlogin.html";
        return false;
      }

      if (userName) userName.textContent = data.user.email?.split("@")[0] || "Admin";
      return true;
    }

    document.querySelectorAll(".nav-item").forEach((btn) => {
      btn.addEventListener("click", () => {
        const page = btn.dataset.page;
        if (page) window.location.href = page;
      });
    });

    chaptersCourseSelect?.addEventListener("change", async () => {
      try {
        setStatus("");
        await loadModules(chaptersCourseSelect.value);
        chapters = [];
        renderEmpty(chaptersCourseSelect.value ? "Select a module to view chapters." : "Select a course first.");
      } catch (error) {
        setStatus(`Failed to load modules: ${error.message}`);
        logDebug({ error: error.message, stack: error.stack });
      }
    });

    chaptersModuleSelect?.addEventListener("change", async () => {
      try {
        await loadChapters(chaptersModuleSelect.value || "");
      } catch (error) {
        setStatus(`Failed to load chapters: ${error.message}`);
        logDebug({ error: error.message, stack: error.stack });
      }
    });

    btnUploadChapter?.addEventListener("click", async () => {
      try {
        await uploadChapter();
      } catch (error) {
        setStatus(`Upload failed: ${error.message}`);
        logDebug({ error: error.message, stack: error.stack });
      }
    });

    btnReloadChapters?.addEventListener("click", async () => {
      try {
        setStatus("Reloading...");
        await loadChapters(chaptersModuleSelect.value || "");
        setStatus("Reloaded.");
        setTimeout(() => setStatus(""), 2000);
      } catch (error) {
        setStatus(`Reload failed: ${error.message}`);
        logDebug({ error: error.message, stack: error.stack });
      }
    });

    searchInput?.addEventListener("input", filterChapters);
    btnClearDebug?.addEventListener("click", () => logDebug(""));
    btnSignOut?.addEventListener("click", async () => {
      await sb.auth.signOut();
      localStorage.removeItem("adminSession");
      window.location.href = "adminlogin.html";
    });

    async function init() {
      const ok = await checkAuth();
      if (!ok) return;
      await loadCourses();
      await loadChapters();
    }

    init().catch((error) => {
      setStatus(`Startup failed: ${error.message}`);
      logDebug({ error: error.message, stack: error.stack });
    });
  </script>
</body>
</html>
