<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Notes Tutor — Admin Login</title>
  <style>
    /* ChatGPT-style UI - Embedded in adminlogin.html */
    *,
    *::before,
    *::after { box-sizing: border-box; }

    :root{
      --bg: #0b1220;
      --sidebar: #0a0f1b;
      --panel: rgba(255,255,255,.06);
      --panel2: rgba(255,255,255,.08);
      --border: rgba(255,255,255,.12);
      --text: rgba(255,255,255,.92);
      --muted: rgba(255,255,255,.66);
      --accent: #8ab4ff;
      --accent2:#a6ffda;
      --danger:#ff7a7a;
      --warning: #ffb86c;
      --shadow: 0 18px 48px rgba(0,0,0,.40);
      --r: 16px;
      --r2: 12px;
    }

    html, body { 
      height: 100%; 
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--text);
    }

    body{
      background:
        radial-gradient(900px 600px at 10% 0%, rgba(138, 180, 255, 0.16), transparent 55%),
        radial-gradient(700px 500px at 100% 20%, rgba(255, 180, 138, 0.10), transparent 60%),
        radial-gradient(700px 500px at 50% 110%, rgba(138, 180, 255, 0.12), transparent 60%),
        var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    /* Login Card - Styled to match ChatGPT UI */
    .wrap {
      width: 100%;
      max-width: 440px;
    }

    .card {
      background: rgba(0, 0, 0, 0.22);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 32px;
      box-shadow: var(--shadow);
    }

    .h1 {
      font-size: 28px;
      font-weight: 900;
      letter-spacing: -0.01em;
      margin: 0 0 8px 0;
      color: var(--text);
      text-align: center;
    }

    .sub {
      font-size: 14px;
      color: var(--muted);
      text-align: center;
      margin: 0 0 28px 0;
      line-height: 1.5;
    }

    .row {
      margin-bottom: 20px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .label {
      font-size: 13.5px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.85);
    }

    input {
      padding: 14px 16px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: rgba(0, 0, 0, 0.22);
      color: var(--text);
      font-size: 15px;
      outline: none;
      transition: all 0.2s ease;
    }

    input:focus {
      border-color: rgba(255, 180, 138, 0.55);
      box-shadow: 0 0 0 4px rgba(255, 180, 138, 0.12);
    }

    input::placeholder {
      color: rgba(255, 255, 255, 0.4);
    }

    input[readonly] {
      cursor: default;
      color: rgba(255, 255, 255, 0.78);
    }

    .actions {
      display: flex;
      gap: 12px;
      margin-top: 32px;
    }

    /* Admin Primary Button (orange theme) */
    #btnSignIn {
      flex: 1;
      border: 0;
      border-radius: 14px;
      padding: 14px 20px;
      cursor: pointer;
      font-weight: 750;
      font-size: 15px;
      background: linear-gradient(135deg, rgba(255, 180, 138, 0.95), rgba(255, 210, 138, 0.80));
      color: #0b1220;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    #btnSignIn:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(255, 180, 138, 0.25);
    }

    /* Secondary Button */
    #btnGoStudent {
      flex: 1;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 14px;
      padding: 14px 20px;
      cursor: pointer;
      font-weight: 750;
      font-size: 15px;
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      transition: all 0.2s ease;
    }

    #btnGoStudent:hover {
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(255, 255, 255, 0.2);
    }

    .status {
      margin-top: 20px;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 13.5px;
      text-align: center;
      min-height: 20px;
    }

    /* Status messages */
    .status.error {
      background: rgba(255, 122, 122, 0.1);
      border: 1px solid rgba(255, 122, 122, 0.3);
      color: #ff7a7a;
    }

    .status.success {
      background: rgba(166, 255, 218, 0.1);
      border: 1px solid rgba(166, 255, 218, 0.3);
      color: #a6ffda;
    }

    .status.info {
      background: rgba(255, 180, 138, 0.1);
      border: 1px solid rgba(255, 180, 138, 0.3);
      color: #ffb48a;
    }

    .status.warning {
      background: rgba(255, 209, 102, 0.12);
      border: 1px solid rgba(255, 209, 102, 0.35);
      color: #ffd166;
      line-height: 1.45;
    }

    /* Admin badge */
    .admin-badge {
      display: inline-block;
      background: rgba(255, 180, 138, 0.15);
      color: #ffb48a;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      margin-left: 8px;
      border: 1px solid rgba(255, 180, 138, 0.3);
    }

    .warning-box {
      background: rgba(255, 184, 108, 0.1);
      border: 1px solid rgba(255, 184, 108, 0.3);
      border-radius: 12px;
      padding: 14px;
      margin-top: 20px;
      font-size: 13px;
      color: #ffb86c;
    }

    .warning-box code {
      background: rgba(0, 0, 0, 0.3);
      padding: 2px 6px;
      border-radius: 4px;
      font-family: 'Courier New', monospace;
      font-size: 12px;
    }

    /* Responsive adjustments */
    @media (max-width: 480px) {
      .card {
        padding: 24px;
      }
      
      .actions {
        flex-direction: column;
      }
      
      .h1 {
        font-size: 24px;
      }
    }

    /* Loading state */
    .loading {
      opacity: 0.7;
      pointer-events: none;
    }

    /* Logo/branding */
    .logo {
      width: 60px;
      height: 60px;
      border-radius: 16px;
      display: block;
      object-fit: contain;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 180, 138, 0.24);
      margin: 0 auto 20px;
      padding: 5px;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <img class="logo" src="../../assets/logo.png" alt="SkillFind AI logo" />
      
      <h1 class="h1">Notes Tutor Admin<span class="admin-badge">Admin</span></h1>
      <p class="sub">Secure admin access. Only authorized administrators can access this dashboard.</p>

      <div class="warning-box">
        <strong>⚠ Admin Access Only</strong><br>
        Only users with <code>profiles.role = 'admin'</code> can access this dashboard.
      </div>

      <div class="row">
        <div class="field">
          <label class="label">Email</label>
          <input id="email" type="email" placeholder="admin@email.com" readonly />
        </div>
      </div>

      <div class="row">
        <div class="field">
          <label class="label">Password</label>
          <input id="password" type="password" placeholder="Password" readonly />
        </div>
      </div>

      <div class="actions">
        <button id="btnSignIn" type="button">Sign In</button>
        <button id="btnGoStudent" type="button" class="btnSecondary">Student Login</button>
      </div>

      <p id="authStatus" class="status"></p>
    </section>
  </main>

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script>
    // ---------- ADMIN LOGIN JS ----------
    (function () {
      const ADMIN_EMAIL = "xola@gmail.com";
      const ADMIN_PASSWORD = "qwertyuiop";
      const SERVER_OFFLINE_MESSAGE =
        "Prototype server is offline. Please contact Xola Mcanjana (Team Leader / Project Manager) via call or WhatsApp at 0790353664, or email ayazingcaxola@gmail.com / 221657770@mywsu.ac.za to start the server and continue reviewing the prototype.";

      const cfg = window.APP_CONFIG || {};
      const el = (id) => document.getElementById(id);
      const ui = {
        email: el("email"),
        password: el("password"),
        btnSignIn: el("btnSignIn"),
        btnGoStudent: el("btnGoStudent"),
        authStatus: el("authStatus"),
      };

      ui.email.value = ADMIN_EMAIL;
      ui.password.value = ADMIN_PASSWORD;

      function setStatus(msg, type = 'error') {
        ui.authStatus.textContent = msg || "";
        ui.authStatus.className = 'status ' + type;
      }

      function clearStatus() {
        ui.authStatus.textContent = "";
        ui.authStatus.className = 'status';
      }

      async function checkPrototypeServer() {
        const apiBase = cfg.API_BASE || "http://localhost:5050";
        const controller = new AbortController();
        const timeoutId = window.setTimeout(() => controller.abort(), 3500);

        try {
          const response = await fetch(`${apiBase}/health`, {
            method: "GET",
            cache: "no-store",
            signal: controller.signal
          });

          if (!response.ok) {
            throw new Error(`Server returned ${response.status}`);
          }
        } catch (error) {
          console.warn("Prototype server health check failed:", error);
          setStatus(SERVER_OFFLINE_MESSAGE, "warning");
        } finally {
          window.clearTimeout(timeoutId);
        }
      }

      checkPrototypeServer();

      if (!cfg.SUPABASE_URL || !cfg.SUPABASE_ANON_KEY) {
        setStatus("Missing APP_CONFIG in config.js (SUPABASE_URL / SUPABASE_ANON_KEY).", "error");
        return;
      }

      const sb = window.supabase.createClient(cfg.SUPABASE_URL, cfg.SUPABASE_ANON_KEY);

      // Redirect to student login
      ui.btnGoStudent.addEventListener("click", () => {
        window.location.href = "../../login.html";
      });

      // Check if user is admin
      async function ensureAdmin(userId) {
        try {
          const { data, error } = await sb
            .from("profiles")
            .select("role, full_name")
            .eq("id", userId)
            .single();
            
          if (error) {
            console.error('Profile error:', error);
            return { ok: false, message: "Profile not found for this user." };
          }
          
          if ((data.role || "").toLowerCase() !== "admin") {
            return { ok: false, message: "Access denied. Admin role required." };
          }
          
          return { ok: true, data };
        } catch (e) {
          console.error('Ensure admin error:', e);
          return { ok: false, message: "Error checking admin status." };
        }
      }

      // Sign in function
      async function signIn() {
        try {
          clearStatus();
          const email = ui.email.value.trim();
          const password = ui.password.value;
          
          if (!email || !password) {
            setStatus("Enter email and password.", 'error');
            return;
          }

          setStatus("Signing in...", 'info');
          
          // Disable button during login
          ui.btnSignIn.disabled = true;
          ui.btnSignIn.textContent = "Signing in...";

          const { data, error } = await sb.auth.signInWithPassword({ email, password });
          
          if (error) {
            throw error;
          }

          const userId = data?.user?.id;
          if (!userId) {
            throw new Error("Login failed: user not returned.");
          }

          // Check if user is admin
          const check = await ensureAdmin(userId);
          if (!check.ok) {
            await sb.auth.signOut();
            setStatus(check.message, 'error');
            ui.btnSignIn.disabled = false;
            ui.btnSignIn.textContent = "Sign In";
            return;
          }

          // Store session in localStorage for admin dashboard
          const sessionData = {
            access_token: data.session.access_token,
            refresh_token: data.session.refresh_token,
            expires_at: data.session.expires_at,
            user: {
              id: data.user.id,
              email: data.user.email
            }
          };
          
          localStorage.setItem('adminSession', JSON.stringify(sessionData));
          localStorage.setItem('adminAuthenticated', 'true');

          setStatus("✓ Signed in. Redirecting to admin dashboard...", 'success');
          
          // Redirect after a short delay
          setTimeout(() => {
            window.location.href = "admin.html";
          }, 1000);

        } catch (error) {
          console.error('Sign in error:', error);
          setStatus(error?.message || "Sign in failed", 'error');
          
          // Re-enable button
          ui.btnSignIn.disabled = false;
          ui.btnSignIn.textContent = "Sign In";
        }
      }

      // Enter key support
      ui.password.addEventListener("keypress", (e) => {
        if (e.key === "Enter") signIn();
      });

      ui.btnSignIn.addEventListener("click", signIn);

      // Check if already logged in (optional)
      (async () => {
        try {
          const { data } = await sb.auth.getSession();
          if (data?.session?.user) {
            // Check if already admin
            const check = await ensureAdmin(data.session.user.id);
            if (check.ok) {
              // Store session and redirect
              const sessionData = {
                access_token: data.session.access_token,
                refresh_token: data.session.refresh_token,
                expires_at: data.session.expires_at,
                user: {
                  id: data.session.user.id,
                  email: data.session.user.email
                }
              };
              
              localStorage.setItem('adminSession', JSON.stringify(sessionData));
              localStorage.setItem('adminAuthenticated', 'true');
              
              // Optional: show a message before redirecting
              setStatus("Already signed in. Redirecting...", 'info');
              setTimeout(() => {
                window.location.href = "admin.html";
              }, 500);
            }
          }
        } catch (e) {
          // Ignore errors here, user will just need to sign in
          console.log('Session check:', e);
        }
      })();

      // Prototype credentials are prefilled and locked for review.

    })();
  </script>
</body>
</html>
