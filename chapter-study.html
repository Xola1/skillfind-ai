:10px 12px}.mode-buttons,.filter-buttons,.topic-pills{display:flex;gap:8px;flex-wrap:wrap}.mode-btn,.filter-pill,.topic-pill,.restart-btn,.nav-btn,.start-btn,.flashcard-btn{border:1px solid var(--line);background:rgba(255,255,255,.07);color:var(--text);border-radius:14px;padding:10px 13px;cursor:pointer;font-weight:750}.mode-btn.active,.filter-pill.active,.topic-pill.active,.start-btn{background:linear-gradient(135deg,var(--brand),var(--brand2));color:#07111f;border-color:transparent}.loading-spinner{text-align:center;padding:44px}.spinner{width:42px;height:42px;border:4px solid rgba(255,255,255,.15);border-top-color:var(--brand2);border-radius:50%;margin:0 auto 14px;animation:spin 1s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}.progress-bar{height:10px;background:rgba(255,255,255,.08);border-radius:99px;overflow:hidden}.progress-fill{height:100%;background:linear-gradient(135deg,var(--brand),var(--brand2))}.question-counter{color:var(--muted);font-size:13px;margin:14px 0}.question-text{font-size:22px;font-weight:850;margin:16px 0}.options-list{display:grid;gap:10px}.option-item{display:flex;gap:12px;align-items:center;border:1px solid var(--line);border-radius:16px;padding:13px;cursor:pointer;background:rgba(255,255,255,.05)}.option-item.selected{border-color:var(--brand);background:rgba(138,180,255,.14)}.option-item.correct{border-color:var(--brand2);background:rgba(166,255,218,.14)}.option-item.wrong{border-color:var(--danger);background:rgba(255,122,122,.14)}.option-letter{width:32px;height:32px;border-radius:10px;background:rgba(255,255,255,.10);display:grid;place-items:center;font-weight:900}.explanation{margin-top:14px;border-left:4px solid var(--brand2);background:rgba(166,255,218,.08);padding:12px;border-radius:12px}.quiz-nav,.flashcard-actions{display:flex;justify-content:space-between;gap:10px;margin-top:18px;flex-wrap:wrap}.score-circle{width:150px;height:150px;border-radius:50%;display:grid;place-items:center;margin:0 auto 18px;border:10px solid rgba(166,255,218,.35)}.score-number{font-size:28px;font-weight:950;text-align:center}.score-label{text-align:center;color:var(--muted)}.results-area{text-align:center}.results-stats{max-width:420px;margin:18px auto;display:grid;gap:8px}.stat-row{display:flex;justify-content:space-between;border:1px solid var(--line);border-radius:12px;padding:10px 12px;background:rgba(255,255,255,.04)}.flashcard-container{perspective:1000px;margin:22px 0}.flashcard{position:relative;min-height:280px;transform-style:preserve-3d;transition:transform .5s;cursor:pointer}.flashcard.flipped{transform:rotateY(180deg)}.flashcard-front,.flashcard-back{position:absolute;inset:0;border:1px solid var(--line);border-radius:24px;background:linear-gradient(135deg,rgba(138,180,255,.14),rgba(166,255,218,.08));display:grid;place-items:center;text-align:center;padding:24px;backface-visibility:hidden}.flashcard-back{transform:rotateY(180deg)}.flashcard-label{color:var(--muted);font-size:13px}.flashcard-content{font-size:24px;font-weight:900;line-height:1.35}.flashcard-hint{color:var(--muted);font-size:12px}.study-guide-content{line-height:1.7}.study-guide-content h1,.study-guide-content h2,.study-guide-content h3{color:#fff}.predictor-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;margin-bottom:18px}.stat-card{display:flex;gap:12px;align-items:center}.stat-icon{font-size:30px}.stat-value{font-size:24px;font-weight:950}.stat-label{color:var(--muted);font-size:13px}.section-title{font-size:18px;font-weight:900;margin:18px 0 12px}.prediction-card{margin-bottom:12px}.prediction-header{display:flex;justify-content:space-between;gap:12px;align-items:center}.prediction-number{font-weight:950;color:var(--brand2)}.prediction-badges{display:flex;gap:8px;flex-wrap:wrap}.type-badge,.confidence-badge,.topic-tag,.difficulty-badge{font-size:11px;border-radius:999px;padding:4px 8px;background:rgba(255,255,255,.08)}.prediction-question{font-size:18px;font-weight:850;margin:12px 0}.prediction-reason{color:var(--muted);font-size:13px}.prediction-topics{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}.error-box{border:1px solid rgba(255,122,122,.4);background:rgba(255,122,122,.10);border-radius:18px;padding:18px;color:#ffd3d3}.success-box{border:1px solid rgba(166,255,218,.35);background:rgba(166,255,218,.08);border-radius:18px;padding:18px}.top-only{min-height:100vh}.top-only .topbar{position:sticky;top:0;z-index:5}.analysis-summary{border:1px solid var(--line);background:rgba(255,255,255,.05);border-radius:16px;padding:14px;margin-bottom:16px}.no-results{text-align:center;color:var(--muted);padding:26px}.nav-btn.submit,.restart-btn.primary{background:linear-gradient(135deg,var(--brand),var(--brand2));color:#07111f;border-color:transparent}@media(max-width:860px){.app{grid-template-columns:1fr}.sidebar{position:fixed;z-index:20;inset:0 auto 0 0;width:310px;transform:translateX(-110%);transition:.2s}.sidebar.open{transform:translateX(0)}.topbar{align-items:flex-start;flex-wrap:wrap}.action-buttons{width:100%}.chat{padding:16px}.composer{flex-direction:column}.tool-header{align-items:flex-start;flex-direction:column}.setting-row{align-items:flex-start;flex-direction:column}.prediction-header{align-items:flex-start;flex-direction:column}}
@media(max-width:640px){html,body{width:100%;overflow-x:hidden}.top-only{min-height:100dvh}.topbar{min-height:auto;align-items:flex-start;gap:10px;padding:calc(10px + env(safe-area-inset-top)) 12px 10px;flex-wrap:wrap}.topbar .btn.ghost{width:100%;justify-content:center}.learning-context{width:100%;min-width:0;margin:0}.context-module,.context-chapter{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.page{width:100%;padding:16px 12px calc(18px + env(safe-area-inset-bottom));overflow:hidden}.tool-header{gap:12px;margin-bottom:14px}.tool-title{font-size:24px;line-height:1.1}.tool-sub{font-size:13px;line-height:1.45}.panel,.prediction-card,.stat-card{border-radius:16px;padding:14px;box-shadow:none}.settings{gap:10px}.setting-row{padding:12px;gap:10px}.setting-row select,.start-btn,.restart-btn,.nav-btn,.flashcard-btn,.mode-btn,.filter-pill,.topic-pill{width:100%;min-height:44px;white-space:normal}.mode-buttons,.filter-buttons,.topic-pills,.quiz-nav,.flashcard-actions{display:grid;grid-template-columns:1fr;gap:8px}.loading-spinner{padding:28px 10px}.question-text{font-size:18px;line-height:1.35}.option-item{align-items:flex-start;padding:12px}.option-letter{flex:0 0 32px}.bubble{max-width:calc(100vw - 48px);overflow-wrap:anywhere}.score-circle{width:128px;height:128px;border-width:8px}.results-stats{max-width:100%}.stat-row{gap:10px}.stat-row span:last-child{text-align:right}.review-section{max-height:none!important}.prediction-header,.tool-header,.setting-row{flex-direction:column;align-items:stretch}.prediction-badges{gap:6px}.prediction-question{font-size:16px;line-height:1.4}.predictor-stats{grid-template-columns:1fr}.flashcard{min-height:320px}.flashcard-front,.flashcard-back{padding:18px}.flashcard-content{font-size:20px;overflow-wrap:anywhere}.study-guide-content{overflow-wrap:anywhere}.study-guide-content pre{white-space:pre-wrap;overflow-x:auto}.study-guide-content img,.study-guide-content table{max-width:100%;display:block;overflow-x:auto}}</style></head>
<body class="top-only">
  <header class="topbar"><button class="btn ghost" onclick="goBackToLearning()">← Back to Learning</button><div class="learning-context" style="display:flex"><div class="context-module">📖 Chapter Study Guide</div><div class="context-chapter" id="contextLine">Loading...</div></div></header>
  <main class="page"><div class="tool-header"><div><h1 class="tool-title">Chapter Study Guide</h1><div class="tool-sub">Generate a focused study guide for your selected chapter.</div></div><button class="start-btn" id="generateBtn">Generate Again</button></div><section class="panel" id="toolBody"></section></main>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script><script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script><script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script><script src="frontend/config.js"></script>
  <script>
    const API_BASE = window.APP_CONFIG.API_BASE;
    const STORAGE_CONTEXT_KEY = "skillfind:selectedContext";
    const { SUPABASE_URL, SUPABASE_ANON_KEY } = window.APP_CONFIG || {};
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const el = (id) => document.getElementById(id);
    function escapeHtml(str){ return String(str || "").replace(/[&<>]/g, m => m === "&" ? "&amp;" : m === "<" ? "&lt;" : "&gt;"); }
    function getSavedContext(){
      let saved = {};
      try { saved = JSON.parse(localStorage.getItem(STORAGE_CONTEXT_KEY) || "{}"); } catch { saved = {}; }
      const p = new URLSearchParams(window.location.search);
      return {
        moduleId: p.get("moduleId") || saved.moduleId || "",
        moduleName: p.get("moduleName") || saved.moduleName || "Module",
        chapterId: p.get("chapterId") || saved.chapterId || "",
        chapterTitle: p.get("chapterTitle") || saved.chapterTitle || "Chapter",
        chapterNumber: p.get("chapterNumber") || saved.chapterNumber || ""
      };
    }
    async function getToken(){ const { data } = await sb.auth.getSession(); return data?.session?.access_token || localStorage.getItem("supabase_token") || ""; }
    async function requireAuth(){
      const { data } = await sb.auth.getSession();
      if (!data?.session) { window.location.href = "login.html"; return false; }
      localStorage.setItem("supabase_token", data.session.access_token);
      return true;
    }
    function contextLabel(ctx){ return `${ctx.moduleName} ${ctx.chapterNumber ? `Chapter ${ctx.chapterNumber}: ` : ""}${ctx.chapterTitle}`.trim(); }
    function showMissingContext(){
      el("toolBody").innerHTML = `<div class="error-box"><strong>No chapter selected.</strong><br/>Go back to the main learning page, select a module and chapter, then open this tool again.</div>`;
    }
    function goBackToLearning(){
      try { localStorage.setItem("skillfind:selectedContext", JSON.stringify(ctx)); } catch {}
      const params = new URLSearchParams({ openChat: "1", ...ctx });
      window.location.href = `index.html?${params.toString()}`;
    }

    const ctx=getSavedContext();
    async function generateStudyGuide(forceRegenerate=false){
      el("toolBody").innerHTML=`<div class="loading-spinner"><div class="spinner"></div><p>Generating your personalized study guide...</p><p class="tool-sub">Using AI to analyze chapter content.</p></div>`;
      try{ const token=await getToken(); const response=await fetch(`${API_BASE}/study/generate`,{method:"POST",headers:{"Content-Type":"application/json",Authorization:`Bearer ${token}`},body:JSON.stringify({moduleId:ctx.moduleId,chapterId:ctx.chapterId,chapterTitle:ctx.chapterTitle,forceRegenerate})}); const data=await response.json(); if(!data.ok) throw new Error(data.error||"Failed to generate study guide"); const html=window.marked?DOMPurify.sanitize(marked.parse(data.studyGuide||"")):`<pre>${escapeHtml(data.studyGuide||"")}</pre>`; el("toolBody").innerHTML=`<div class="study-guide-content">${html}</div>`; }catch(e){ console.error(e); el("toolBody").innerHTML=`<div class="error-box"><strong>Failed to generate study guide.</strong><br/>${escapeHtml(e.message)}<br/><br/><button class="restart-btn primary" onclick="generateStudyGuide(true)">Retry</button></div>`; }
    }
    el("generateBtn")?.addEventListener("click",()=>generateStudyGuide(true));
    (async function init(){ if(!(await requireAuth())) return; el("contextLine").textContent=contextLabel(ctx); if(!ctx.chapterId)return showMissingContext(); generateStudyGuide(); })();
  </script>
</body></html>
