<html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>SkillFind AI — Quiz</title><style>

ead>
<body class="top-only">
  <header class="topbar"><button class="btn ghost" onclick="goBackToLearning()">← Back to Learning</button><div class="learning-context" style="display:flex"><div class="context-module">📝 Quiz Mode</div><div class="context-chapter" id="contextLine">Loading...</div></div></header>
  <main class="page"><div class="tool-header"><div><h1 class="tool-title">Quiz Mode</h1><div class="tool-sub">Generate practice or exam-style questions for the selected chapter.</div></div></div><section class="panel" id="toolBody"></section></main>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script><script src="frontend/config.js"></script>
<script>
    const API_BASE = window.APP_CONFIG.API_BASE;
    const STORAGE_CONTEXT_KEY = "skillfind:selectedContext";
    const { SUPABASE_URL, SUPABASE_ANON_KEY } = window.APP_CONFIG || {};
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const el = (id) => document.getElementById(id);
    
    function escapeHtml(str){ return String(str || "").replace(/[&<>]/g, m => m === "&" ? "&amp;" : m === "<" , "&gt;"); }
    
    function getSavedContext(){
      let saved = {};
      try { saved = JSON.parse(localStorage.getItem(STORAGE_CONTEXT_KEY) || "{}"); } catch { saved = {}; }
      const p = new URLSearchParams(window.location.search);
      return {
        moduleId: p.get("moduleId") || saved.moduleId || "",
        moduleName: p.get("moduleName") || saved.moduleName || "Module",
        chapterId: p.get("chapterId") || saved.chapterId || "",
        chapterTitle: p.get("chapterTitle") || saved.chapterTitle || "Chapter",
        chapterNumber: p.get("chapterNumber") || saved.chapterNumber || "",
        chapterIds: p.get("chapterIds") || saved.chapterIds || "",
        source: p.get("source") || saved.source || ""
      };
    }
    
    async function getToken(){ 
      const { data } = await sb.auth.getSession(); 
      return data?.session?.access_token || localStorage.getItem("supabase_token") || ""; 
    }

    function formatTime(seconds){
      const total = Number(seconds) || 0;
      return `${Math.floor(total / 60)}m ${total % 60}s`;
    }

    async function loadActivityLeaderboard(activityType, containerId){
      const container = el(containerId);
      if (!container || !ctx.chapterId) return;
      try {
        const token = await getToken();
        const response = await fetch(`${API_BASE}/activity/leaderboard?activityType=${encodeURIComponent(activityType)}&chapterId=${encodeURIComponent(ctx.chapterId)}&limit=8`, {
          headers: { Authorization: `Bearer ${token}` }
        });
        const data = await response.json();
        const rows = data.leaderboard || [];
        container.innerHTML = rows.length ? rows.map(row => `
          <div class="stat-row">
            <span>#${row.rank} ${escapeHtml(row.student_name)}</span>
            <span>${row.score}/${(row.correct_count || 0) + (row.incorrect_count || 0) || row.score} (${Math.round(row.accuracy || 0)}%)</span>
          </div>
        `).join("") : `<div class="hint">No quiz leaderboard scores yet.</div>`;
      } catch (error) {
        console.warn("Could not load quiz leaderboard:", error);
        container.innerHTML = `<div class="hint">Leaderboard unavailable.</div>`;
      }
    }
    
    async function requireAuth(){
      const { data } = await sb.auth.getSession();
      if (!data?.session) { 
        window.location.href = "login.html"; 
        return false; 
      }
      localStorage.setItem("supabase_token", data.session.access_token);
      return true;
    }
    
    function contextLabel(ctx){ return `${ctx.moduleName} ${ctx.chapterNumber ? `Chapter ${ctx.chapterNumber}: ` : ""}${ctx.chapterTitle}`.trim(); }
    
    function showMissingContext(){
      el("toolBody").innerHTML = `<div class="error-box"><strong>No chapter selected.</strong><br/>Go back to the main learning page, select a module and chapter, then open this tool again.</div>`;
    }
    
    function goBackToLearning(){
      try { localStorage.setItem("skillfind:selectedContext", JSON.stringify(ctx)); } catch {}
      const params = new URLSearchParams({ openChat: "1", ...ctx });
      window.location.href = `index.html?${params.toString()}`;
    }

    const ctx = getSavedContext();
    
    let quizState = { 
      questions: [], 
      currentIndex: 0, 
      answers: [], 
      showReview: false, 
      startTime: null,
      settings: { 
        questionCount: 5, 
        mode: "practice",
        difficulty: "medium"
      } 
    };
    
    let quizSettings = {
      questionCount: 5,
      difficulty: "medium",
      showExplanations: true
    };
    
    async function renderSettings(){
      // Show chapter info to confirm context
      console.log("Chapter ID:", ctx.chapterId);
      console.log("Chapter Title:", ctx.chapterTitle);
      
      el("toolBody").innerHTML = `
        <div class="settings">
          <div class="setting-row">
            <span>📖 Chapter:</span>
            <span style="color: #a6ffda;">${escapeHtml(ctx.chapterTitle)}</span>
          </div>
          <div class="setting-row">
            <span>📊 Number of Questions</span>
            <select id="questionCount">
              <option value="3">3 Questions</option>
              <option value="5" selected>5 Questions</option>
              <option value="10">10 Questions</option>
              <option value="15">15 Questions</option>
            </select>
          </div>
          
          <div class="setting-row">
            <span>🎯 Difficulty Level</span>
            <div class="mode-buttons" id="difficultyBtns">
              <button class="mode-btn" data-difficulty="easy">Easy</button>
              <button class="mode-btn active" data-difficulty="medium">Medium</button>
              <button class="mode-btn" data-difficulty="hard">Hard</button>
            </div>
          </div>
          
          <div class="setting-row">
            <span>🎯 Quiz Mode</span>
            <div class="mode-buttons">
              <button class="mode-btn active" data-mode="practice">Practice (Show Explanations)</button>
              <button class="mode-btn" data-mode="exam">Exam Mode (No Explanations)</button>
            </div>
          </div>
          
          <button class="start-btn" id="startQuizBtn">🚀 Start AI-Generated Quiz</button>
          <div class="tool-sub">Questions are loaded from the saved question bank. AI only fills a small gap when needed.</div>
          <div class="panel" style="padding:14px;box-shadow:none;">
            <div class="section-title" style="margin-top:0;">Quiz Leaderboard</div>
            <div id="quizLeaderboard"><div class="hint">Loading leaderboard...</div></div>
          </div>
        </div>
      `;
      
      document.querySelectorAll("[data-difficulty]").forEach(btn => {
        btn.addEventListener("click", () => {
          document.querySelectorAll("[data-difficulty]").forEach(b => b.classList.remove("active"));
          btn.classList.add("active");
          quizSettings.difficulty = btn.dataset.difficulty;
        });
      });
      
      document.querySelectorAll("[data-mode]").forEach(btn => {
        btn.addEventListener("click", () => {
          document.querySelectorAll("[data-mode]").forEach(b => b.classList.remove("active"));
          btn.classList.add("active");
          quizSettings.mode = btn.dataset.mode;
          quizSettings.showExplanations = btn.dataset.mode === "practice";
        });
      });
      
      el("startQuizBtn").addEventListener("click", () => {
        quizSettings.questionCount = parseInt(el("questionCount").value, 10);
        generateQuizQuestions();
      });

      loadActivityLeaderboard("quiz", "quizLeaderboard");
    }
    
    async function generateQuizQuestions(){
      el("toolBody").innerHTML = `<div class="loading-spinner"><div class="spinner"></div><p>Loading ${quizSettings.questionCount} saved questions from your chapter bank...</p><p style="font-size:12px; margin-top:10px;">Using: ${escapeHtml(ctx.chapterTitle)}</p></div>`;
      
      try {
        const token = await getToken();
        
        if (!token) {
          throw new Error("No authentication token found");
        }
        
        if (!ctx.chapterId) {
          throw new Error("No chapter selected. Please go back and select a chapter first.");
        }
        
        console.log("Sending request to generate quiz:", {
          moduleId: ctx.moduleId,
          chapterId: ctx.chapterId,
          chapterTitle: ctx.chapterTitle,
          questionCount: quizSettings.questionCount,
          difficulty: quizSettings.difficulty
        });
        
        const endpoint = ctx.source === "exam-practice" ? "/exam-practice/quiz/generate" : "/quiz/generate";
        const response = await fetch(`${API_BASE}${endpoint}`, { 
          method: "POST", 
          headers: { 
            "Content-Type": "application/json", 
            "Authorization": `Bearer ${token}` 
          }, 
          body: JSON.stringify({ 
            moduleId: ctx.moduleId, 
            chapterId: ctx.chapterId,
            chapterIds: ctx.chapterIds,
            chapterTitle: ctx.chapterTitle, 
            questionCount: quizSettings.questionCount,
            difficulty: quizSettings.difficulty,
            questionTypes: ["mcq", "truefalse"]
          }) 
        });
        
        const data = await response.json();
        console.log("Response from server:", data);
        
        if (data.ok && data.questions && data.questions.length > 0) {
          quizState.questions = data.questions;
          console.log(`✅ Received ${quizState.questions.length} AI-generated questions`);
        } else {
          console.warn("No questions from AI, using fallback");
          quizState.questions = generateMockQuestions(ctx.chapterTitle, quizSettings.questionCount);
        }
        
      } catch(error) { 
        console.error("Failed to generate AI questions:", error);
        el("toolBody").innerHTML = `
          <div class="error-box">
            <strong>⚠️ Could not generate AI questions</strong><br/>
            Error: ${escapeHtml(error.message)}<br/><br/>
            <button class="restart-btn" onclick="renderSettings()">Try Again</button>
            <button class="restart-btn" onclick="goBackToLearning()">Back to Learning</button>
          </div>
        `;
        return;
      }
      
      if (!quizState.questions || quizState.questions.length === 0) {
        el("toolBody").innerHTML = `
          <div class="error-box">
            <strong>⚠️ No questions were generated</strong><br/>
            Please make sure your chapter has content and try again.<br/><br/>
            <button class="restart-btn" onclick="renderSettings()">Try Again</button>
          </div>
        `;
        return;
      }
      
      quizState.answers = new Array(quizState.questions.length).fill(null);
      quizState.currentIndex = 0;
      quizState.showReview = false;
      quizState.startTime = Date.now();
      renderCurrentQuestion();
    }
    
    // Fallback mock questions - only used when AI fails
    function generateMockQuestions(chapter, count) { 
      console.warn("Using MOCK questions because AI generation failed");
      const base = [
        {type:"mcq", text:`Based on the chapter "${chapter}", what is the most important concept for practical application?`, options:["Theoretical frameworks","Hands-on implementation","Historical background","Mathematical proofs"], correct:1, explanation:"The chapter emphasizes practical, hands-on skills that can be directly applied in real-world scenarios.", difficulty:"medium"},
        {type:"truefalse", text:`The chapter "${chapter}" focuses primarily on theoretical concepts rather than practical application.`, options:["True","False"], correct:1, explanation:"The chapter is designed to bridge theory with practical, real-world applications.", difficulty:"easy"},
        {type:"mcq", text:`How does "${chapter}" prepare you for real-world challenges?`, options:["By memorizing definitions","Through practical exercises and case studies","By reading textbooks only","Through theoretical discussions"], correct:1, explanation:"Hands-on exercises and real case studies help connect learning to practical situations.", difficulty:"medium"}
      ]; 
      let result = [];
      for (let i = 0; i < count; i++) {
        result.push({...base[i % base.length], id: i});
      }
      return result; 
    }
    
    function renderCurrentQuestion(){
      const q = quizState.questions[quizState.currentIndex];
      const saved = quizState.answers[quizState.currentIndex];
      const isLast = quizState.currentIndex === quizState.questions.length - 1;
      const progress = ((quizState.currentIndex + 1) / quizState.questions.length) * 100;
      const letters = ["A", "B", "C", "D"];
      
      let optionsHtml = "";
      
      if (q.type === "truefalse") {
        optionsHtml = (q.options || ["True", "False"]).map((opt, idx) => {
          let cls = "";
          if (quizSettings.showExplanations && quizState.showReview && saved !== null) {
            if (idx === q.correct) cls = "correct";
            else if (saved === idx) cls = "wrong";
          } else if (saved === idx) cls = "selected";
          return `<div class="option-item ${cls}" data-index="${idx}"><div class="option-letter">${idx === 0 ? "T" : "F"}</div><div>${escapeHtml(opt)}</div></div>`;
        }).join("");
      } else {
        optionsHtml = (q.options || []).map((opt, idx) => {
          let cls = "";
          if (quizSettings.showExplanations && quizState.showReview && saved !== null) {
            if (idx === q.correct) cls = "correct";
            else if (saved === idx) cls = "wrong";
          } else if (saved === idx) cls = "selected";
          return `<div class="option-item ${cls}" data-index="${idx}"><div class="option-letter">${letters[idx]}</div><div>${escapeHtml(opt)}</div></div>`;
        }).join("");
      }
      
      const showExplanation = quizSettings.showExplanations && quizState.showReview && saved !== null;
      const explanation = showExplanation ? `<div class="explanation">${saved === q.correct ? "✅ Correct!" : "❌ Incorrect."} ${escapeHtml(q.explanation || '')}</div>` : "";
      
      const difficultyBadge = q.difficulty ? `<span style="background:${q.difficulty === 'easy' ? '#2ecc71' : q.difficulty === 'medium' ? '#f39c12' : '#e74c3c'}20; padding:2px 8px; border-radius:12px; font-size:11px; margin-left:10px;">${q.difficulty}</span>` : "";
      const typeBadge = `<span style="background:rgba(138,180,255,0.2); padding:2px 8px; border-radius:12px; font-size:11px; margin-left:10px;">${q.type === 'mcq' ? 'Multiple Choice' : 'True/False'}</span>`;
      
      el("toolBody").innerHTML = `
        <div>
          <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
          <div class="question-counter">
            Question ${quizState.currentIndex+1} of ${quizState.questions.length}
            ${typeBadge}${difficultyBadge}
          </div>
          <div class="question-text">${escapeHtml(q.text)}</div>
          <div class="options-list" id="optionsList">${optionsHtml}</div>
          ${explanation}
          <div class="quiz-nav">
            <button class="nav-btn" id="prevBtn" ${quizState.currentIndex===0?"disabled":""}>← Previous</button>
            ${isLast ? `<button class="nav-btn submit" id="submitBtn">${quizState.showReview ? "✓ See Results" : "✓ Submit Quiz"}</button>` : `<button class="nav-btn" id="nextBtn">Next →</button>`}
          </div>
        </div>
      `;
      
      if (!(quizSettings.showExplanations && quizState.showReview)) {
        document.querySelectorAll("#optionsList .option-item").forEach(opt => {
          opt.addEventListener("click", () => {
            const selectedIndex = parseInt(opt.dataset.index, 10);
            quizState.answers[quizState.currentIndex] = selectedIndex;
            
            if (!quizSettings.showExplanations) {
              if (quizState.currentIndex < quizState.questions.length - 1) {
                setTimeout(() => { quizState.currentIndex++; renderCurrentQuestion(); }, 250);
              } else {
                setTimeout(showResults, 250);
              }
            } else {
              renderCurrentQuestion();
            }
          });
        });
      }
      
      el("prevBtn")?.addEventListener("click", () => {
        if (quizState.currentIndex > 0) {
          quizState.currentIndex--;
          renderCurrentQuestion();
        }
      });
      
      el("nextBtn")?.addEventListener("click", () => {
        if (quizState.currentIndex < quizState.questions.length - 1) {
          quizState.currentIndex++;
          renderCurrentQuestion();
        }
      });
      
      el("submitBtn")?.addEventListener("click", () => {
        if (quizSettings.showExplanations && !quizState.showReview) {
          quizState.showReview = true;
          renderCurrentQuestion();
        } else {
          showResults();
        }
      });
    }
    
    async function saveQuizAttempt({ score, pct, timeSpent }) {
      try {
        const token = await getToken();
        if (!token) return;

        const answers = quizState.questions.map((question, index) => {
          const selectedIndex = quizState.answers[index];
          const selectedAnswer = question.options?.[selectedIndex] ?? "";
          const correctAnswer = question.options?.[question.correct] ?? question.correct_answer ?? "";
          return {
            questionId: question.id,
            questionText: question.text,
            topicTags: question.topic_tags || question.topics || [ctx.chapterTitle || "General"],
            selectedAnswer,
            correctAnswer,
            isCorrect: selectedIndex === question.correct
          };
        });

        await fetch(`${API_BASE}/activity/attempts`, {
          method: "POST",
          headers: { "Content-Type": "application/json", Authorization: `Bearer ${token}` },
          body: JSON.stringify({
            activityType: "quiz",
            moduleId: ctx.moduleId,
            chapterId: ctx.chapterId,
            score,
            maxScore: quizState.questions.length,
            accuracy: pct,
            correctCount: score,
            incorrectCount: quizState.questions.length - score,
            timeTaken: timeSpent || 0,
            participationCount: quizState.questions.length,
            metadata: {
              mode: quizSettings.mode,
              difficulty: quizSettings.difficulty,
              chapterTitle: ctx.chapterTitle
            },
            answers
          })
        });
      } catch (error) {
        console.warn("Could not save quiz leaderboard attempt:", error);
      }
    }

    function showResults(){ 
      const score = quizState.questions.filter((q, i) => quizState.answers[i] === q.correct).length;
      const pct = Math.round((score / quizState.questions.length) * 100);
      const timeSpent = quizState.startTime ? Math.round((Date.now() - quizState.startTime) / 1000) : null;
      saveQuizAttempt({ score, pct, timeSpent });
      
      let msg = pct >= 90 ? "Excellent! 🎉 You've mastered this material!" : 
                pct >= 70 ? "Good job! 👍 Keep up the great work!" : 
                pct >= 50 ? "Keep practicing! 💪 You're making progress!" : 
                "Review the material and try again 📚 Don't give up!";
      
      let reviewHtml = '';
      if (quizSettings.showExplanations) {
        reviewHtml = `
          <div class="review-section" style="margin-top: 20px; text-align: left; max-height: 400px; overflow-y: auto; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 16px;">
            <div style="font-weight: bold; margin-bottom: 12px;">📝 Review Your Answers:</div>
            ${quizState.questions.map((q, i) => {
              const isCorrect = quizState.answers[i] === q.correct;
              const userAnswerText = q.options ? q.options[quizState.answers[i]] : (quizState.answers[i] !== null ? quizState.answers[i] : "Not answered");
              const correctAnswerText = q.options ? q.options[q.correct] : q.correct;
              return `
                <div style="margin-bottom: 16px; padding: 12px; background: rgba(255,255,255,0.05); border-radius: 12px; border-left: 4px solid ${isCorrect ? '#a6ffda' : '#ff7a7a'}">
                  <div style="font-weight: bold; margin-bottom: 8px;">Q${i+1}: ${escapeHtml(q.text)}</div>
                  <div style="font-size: 13px; color: ${isCorrect ? '#a6ffda' : '#ff7a7a'}">Your answer: ${escapeHtml(String(userAnswerText))}</div>
                  ${!isCorrect ? `<div style="font-size: 13px; color: #a6ffda">Correct answer: ${escapeHtml(String(correctAnswerText))}</div>` : ''}
                  <div style="font-size: 12px; color: rgba(255,255,255,0.6); margin-top: 8px;">💡 ${escapeHtml(q.explanation || '')}</div>
                </div>
              `;
            }).join('')}
          </div>
        `;
      }
      
      el("toolBody").innerHTML = `
        <div class="results-area">
          <div class="score-circle">
            <div>
              <div class="score-number">${score}/${quizState.questions.length}</div>
              <div class="score-label">${pct}%</div>
            </div>
          </div>
          <div style="font-size:18px;font-weight:800">${msg}</div>
          <div class="results-stats">
            <div class="stat-row"><span>✅ Correct:</span><span>${score}</span></div>
            <div class="stat-row"><span>❌ Incorrect:</span><span>${quizState.questions.length - score}</span></div>
            <div class="stat-row"><span>📊 Mode:</span><span>${quizSettings.mode === "practice" ? "Practice" : "Exam"}</span></div>
            <div class="stat-row"><span>🎯 Difficulty:</span><span>${quizSettings.difficulty}</span></div>
            ${timeSpent ? `<div class="stat-row"><span>⏱️ Time Spent:</span><span>${Math.floor(timeSpent / 60)}m ${timeSpent % 60}s</span></div>` : ''}
          </div>
          ${reviewHtml}
          <div class="panel" style="padding:14px;box-shadow:none;margin-top:20px;text-align:left;">
            <div class="section-title" style="margin-top:0;">Quiz Leaderboard</div>
            <div id="quizResultsLeaderboard"><div class="hint">Updating leaderboard...</div></div>
          </div>
          <div style="display: flex; gap: 10px; justify-content: center; margin-top: 20px;">
            <button class="restart-btn primary" onclick="location.reload()">⟳ New Quiz</button>
            <button class="restart-btn" onclick="goBackToLearning()">📚 Back to Learning</button>
          </div>
        </div>
      `;
      setTimeout(() => loadActivityLeaderboard("quiz", "quizResultsLeaderboard"), 700);
    }
    
    (async function init(){ 
      if(!(await requireAuth())) return; 
      el("contextLine").textContent = contextLabel(ctx); 
      if(!ctx.chapterId) return showMissingContext(); 
      renderSettings(); 
    })();
  </script>
</body></html>
