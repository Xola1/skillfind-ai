<html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>SkillFind AI — Flashcards</title><style>

    button,input,select{font:inherit}.hidden{display:none!important}.app{display:grid;grid-template-columns:310px 1fr;min-height:100vh}.sidebar{background:rgba(8,16,30,.86);backdrop-filter:blur(18px);border-right:1px solid var(--line);padding:18px;display:flex;flex-direction:column;gap:16px}.sbTop{display:flex;align-items:center;justify-content:space-between;gap:12px}.sbBrand{display:flex;align-items:center;gap:12px}.sbLogo{width:44px;height:44px;border-radius:16px;display:grid;place-items:center;background:linear-gradient(135deg,var(--brand),var(--brand2));font-size:22px}.sbTitle{font-weight:800;font-size:18px}.sbSub{color:var(--muted);font-size:12px}.iconBtn{border:1px solid var(--line);background:rgba(255,255,255,.06);color:var(--text);border-radius:12px;padding:9px 12px;cursor:pointer}.sbSection{border:1px solid var(--line);border-radius:18px;background:rgba(255,255,255,.04);padding:14px}.sbSectionTitle{font-size:12px;text-transform:uppercase;color:var(--muted);letter-spacing:.08em;margin-bottom:10px}.sbAccount{display:flex;gap:10px;align-items:center;justify-content:space-between}.whoami{font-size:13px;color:var(--text);overflow:hidden;text-overflow:ellipsis}.btn{border:0;border-radius:14px;padding:10px 14px;cursor:pointer;font-weight:700}.btn.primary{background:linear-gradient(135deg,var(--brand),var(--brand2));color:#07111f}.btn.ghost{background:rgba(255,255,255,.08);color:var(--text);border:1px solid var(--line)}.btn:disabled{opacity:.55;cursor:not-allowed}.tree{display:flex;flex-direction:column;gap:8px}.treeHead,.treeChildBtn,.study-mode-item{width:100%;text-align:left;border:1px solid transparent;background:rgba(255,255,255,.04);color:var(--text);border-radius:14px;padding:10px 12px;cursor:pointer}.treeHead.active,.treeChildBtn.active,.study-mode-item:hover{border-color:rgba(138,180,255,.45);background:rgba(138,180,255,.13)}.treeChildBtn{margin:6px 0 0 18px;width:calc(100% - 18px);font-size:13px;color:#dce7f8}.treeEmpty,.hint{font-size:13px;color:var(--muted);line-height:1.5}.study-mode-list{display:grid;gap:8px}.study-mode-item{display:flex;gap:10px;align-items:center}.sbFooter{margin-top:auto}.main{display:grid;grid-template-rows:auto 1fr auto;min-width:0}.topbar{min-height:72px;display:flex;align-items:center;gap:14px;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--line);background:rgba(7,17,31,.62);backdrop-filter:blur(16px)}.learning-context{display:flex;flex-direction:column;gap:3px;margin-right:auto}.context-module{font-weight:800}.context-chapter{font-size:13px;color:var(--muted)}.action-buttons{display:flex;gap:8px;flex-wrap:wrap}.action-btn{border:1px solid var(--line);background:rgba(255,255,255,.06);color:var(--text);border-radius:14px;padding:9px 12px;cursor:pointer;display:flex;gap:8px;align-items:center}.action-btn:hover{border-color:rgba(166,255,218,.45);background:rgba(166,255,218,.10)}.chat{overflow:auto;padding:24px}.step-flow,.learning-interface,.tool-shell{max-width:1120px;margin:0 auto}.step-title{font-size:28px;font-weight:900;margin:12px 0 22px}.modules-grid,.chapters-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px}.module-card,.chapter-card,.panel,.prediction-card,.stat-card{border:1px solid var(--line);background:rgba(255,255,255,.06);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px}.module-card,.chapter-card{cursor:pointer;transition:.18s transform,.18s border-color}.module-card:hover,.chapter-card:hover{transform:translateY(-3px);border-color:rgba(138,180,255,.5)}.module-icon{font-size:34px;margin-bottom:12px}.module-name,.chapter-title{font-size:18px;font-weight:850}.course-name,.chapter-number{font-size:13px;color:var(--muted);margin-top:8px}.back-button{border:1px solid var(--line);border-radius:14px;background:rgba(255,255,255,.08);color:var(--text);padding:10px 13px;cursor:pointer;margin-bottom:16px}.empty{text-align:center;border:1px solid var(--line);background:rgba(255,255,255,.05);border-radius:26 :10px 12px}.mode-buttons,.filter-buttons,.topic-pills{display:flex;gap:8px;flex-wrap:wrap}.mode-btn,.filter-pill,.topic-pill,.restart-btn,.nav-btn,.start-btn,.flashcard-btn{border:1px solid var(--line);background:rgba(255,255,255,.07);color:var(--text);border-radius:14px;padding:10px 13px;cursor:pointer;font-weight:750}.mode-btn.active,.filter-pill.active,.topic-pill.active,.start-btn{background:linear-gradient(135deg,var(--brand),var(--brand2));color:#07111f;border-color:transparent}.loading-spinner{text-align:center;padding:44px}.spinner{width:42px;height:42px;border:4px solid rgba(255,255,255,.15);border-top-color:var(--brand2);border-radius:50%;margin:0 auto 14px;animation:spin 1s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}.progress-bar{height:10px;background:rgba(255,255,255,.08);border-radius:99px;overflow:hidden}.progress-fill{height:100%;background:linear-gradient(135deg,var(--brand),var(--brand2))}.question-counter{color:var(--muted);font-size:13px;margin:14px 0}.question-text{font-size:22px;font-weight:850;margin:16px 0}.options-list{display:grid;gap:10px}.option-item{display:flex;gap:12px;align-items:center;border:1px solid var(--line);border-radius:16px;padding:13px;cursor:pointer;background:rgba(255,255,255,.05)}.option-item.selected{border-color:var(--brand);background:rgba(138,180,255,.14)}.option-item.correct{border-color:var(--brand2);background:rgba(166,255,218,.14)}.option-item.wrong{border-color:var(--danger);background:rgba(255,122,122,.14)}.option-letter{width:32px;height:32px;border-radius:10px;background:rgba(255,255,255,.10);display:grid;place-items:center;font-weight:900}.explanation{margin-top:14px;border-left:4px solid var(--brand2);background:rgba(166,255,218,.08);padding:12px;border-radius:12px}.quiz-nav,.flashcard-actions{display:flex;justify-content:space-between;gap:10px;margin-top:18px;flex-wrap:wrap}.score-circle{width:150px;height:150px;border-radius:50%;display:grid;place-items:center;margin:0 auto 18px;border:10px solid rgba(166,255,218,.35)}.score-number{font-size:28px;font-weight:950;text-align:center}.score-label{text-align:center;color:var(--muted)}.results-area{text-align:center}.results-stats{max-width:420px;margin:18px auto;display:grid;gap:8px}.stat-row{display:flex;justify-content:space-between;border:1px solid var(--line);border-radius:12px;padding:10px 12px;background:rgba(255,255,255,.04)}.flashcard-container{perspective:1000px;margin:22px 0}.flashcard{position:relative;min-height:280px;transform-style:preserve-3d;transition:transform .5s;cursor:pointer}.flashcard.flipped{transform:rotateY(180deg)}.flashcard-front,.flashcard-back{position:absolute;inset:0;border:1px solid var(--line);border-radius:24px;background:linear-gradient(135deg,rgba(138,180,255,.14),rgba(166,255,218,.08));display:grid;place-items:center;text-align:center;padding:24px;backface-visibility:hidden}.flashcard-back{transform:rotateY(180deg)}.flashcard-label{color:var(--muted);font-size:13px}.flashcard-content{font-size:24px;font-weight:900;line-height:1.35}.flashcard-hint{color:var(--muted);font-size:12px}.study-guide-content{line-height:1.7}.study-guide-content h1,.study-guide-content h2,.study-guide-content h3{color:#fff}.predictor-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;margin-bottom:18px}.stat-card{display:flex;gap:12px;align-items:center}.stat-icon{font-size:30px}.stat-value{font-size:24px;font-weight:950}.stat-label{color:var(--muted);font-size:13px}.section-title{font-size:18px;font-weight:900;margin:18px 0 12px}.prediction-card{margin-bottom:12px}.prediction-header{display:flex;justify-content:space-between;gap:12px;align-items:center}.prediction-number{font-weight:950;color:var(--brand2)}.prediction-badges{display:flex;gap:8px;flex-wrap:wrap}.type-badge,.confidence-badge,.topic-tag,.difficulty-badge{font-size:11px;border-radius:999px;padding:4px 8px;background:rgba(255,255,255,.08)}.prediction-question{font-size:18px;font-weight:850;margin:12px 0}.prediction-reason{color:var(--muted);font-size:13px}.prediction-topics{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}.error-box{border:1px solid rgba(255,122,122,.4);background:rgba(255,122,122,.10);border-radius:18px;padding:18px;color:#ffd3d3}.success-box{border:1px solid rgba(166,255,218,.35);background:rgba(166,255,218,.08);border-radius:18px;padding:18px}.top-only{min-height:100vh}.top-only .topbar{position:sticky;top:0;z-index:5}.analysis-summary{border:1px solid var(--line);background:rgba(255,255,255,.05);border-radius:16px;padding:14px;margin-bottom:16px}.no-results{text-align:center;color:var(--muted);padding:26px}.nav-btn.submit,.restart-btn.primary{background:linear-gradient(135deg,var(--brand),var(--brand2));color:#07111f;border-color:transparent}@media(max-width:860px){.app{grid-template-columns:1fr}.sidebar{position:fixed;z-index:20;inset:0 auto 0 0;width:310px;transform:translateX(-110%);transition:.2s}.sidebar.open{transform:translateX(0)}.topbar{align-items:flex-start;flex-wrap:wrap}.action-buttons{width:100%}.chat{padding:16px}.composer{flex-direction:column}.tool-header{align-items:flex-start;flex-direction:column}.setting-row{align-items:flex-start;flex-direction:column}.prediction-header{align-items:flex-start;flex-direction:column}}
@media(max-width:640px){html,body{width:100%;overflow-x:hidden}.top-only{min-height:100dvh}.topbar{min-height:auto;align-items:flex-start;gap:10px;padding:calc(10px + env(safe-area-inset-top)) 12px 10px;flex-wrap:wrap}.topbar .btn.ghost{width:100%;justify-content:center}.learning-context{width:100%;min-width:0;margin:0}.context-module,.context-chapter{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.page{width:100%;padding:16px 12px calc(18px + env(safe-area-inset-bottom));overflow:hidden}.tool-header{gap:12px;margin-bottom:14px}.tool-title{font-size:24px;line-height:1.1}.tool-sub{font-size:13px;line-height:1.45}.panel,.prediction-card,.stat-card{border-radius:16px;padding:14px;box-shadow:none}.settings{gap:10px}.setting-row{padding:12px;gap:10px}.setting-row select,.start-btn,.restart-btn,.nav-btn,.flashcard-btn,.mode-btn,.filter-pill,.topic-pill{width:100%;min-height:44px;white-space:normal}.mode-buttons,.filter-buttons,.topic-pills,.quiz-nav,.flashcard-actions{display:grid;grid-template-columns:1fr;gap:8px}.loading-spinner{padding:28px 10px}.question-text{font-size:18px;line-height:1.35}.option-item{align-items:flex-start;padding:12px}.option-letter{flex:0 0 32px}.bubble{max-width:calc(100vw - 48px);overflow-wrap:anywhere}.score-circle{width:128px;height:128px;border-width:8px}.results-stats{max-width:100%}.stat-row{gap:10px}.stat-row span:last-child{text-align:right}.review-section{max-height:none!important}.prediction-header,.tool-header,.setting-row{flex-direction:column;align-items:stretch}.prediction-badges{gap:6px}.prediction-question{font-size:16px;line-height:1.4}.predictor-stats{grid-template-columns:1fr}.flashcard{min-height:320px}.flashcard-front,.flashcard-back{padding:18px}.flashcard-content{font-size:20px;overflow-wrap:anywhere}.study-guide-content{overflow-wrap:anywhere}.study-guide-content pre{white-space:pre-wrap;overflow-x:auto}.study-guide-content img,.study-guide-content table{max-width:100%;display:block;overflow-x:auto}}</style></h <body class="top-only">
  <header class="topbar"><button class="btn ghost" onclick="goBackToLearning()">← Back to Learning</button><div class="learning-context" style="display:flex"><div class="context-module">🃏 Flashcard Mode</div><div class="context-chapter" id="contextLine">Loading...</div></div></header>
  <main class="page"><div class="tool-header"><div><h1 class="tool-title">Flashcards</h1><div class="tool-sub">Study key terms and definitions from the selected chapter.</div></div></div><section class="panel" id="toolBody"></section></main>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script><script src="frontend/config.js"></script>
  <script>
    const API_BASE = window.APP_CONFIG.API_BASE;
    const STORAGE_CONTEXT_KEY = "skillfind:selectedContext";
    const { SUPABASE_URL, SUPABASE_ANON_KEY } = window.APP_CONFIG || {};
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const el = (id) => document.getElementById(id);
    function escapeHtml(str){ return String(str || "").replace(/[&<>]/g, m => m === "&" ? "&amp;" : m === "<" ? "&lt;" : "&gt;"); }
    function getSavedContext(){
      let saved = {};
      try { saved = JSON.parse(localStorage.getItem(STORAGE_CONTEXT_KEY) || "{}"); } catch { saved = {}; }
      const p = new URLSearchParams(window.location.search);
      return {
        moduleId: p.get("moduleId") || saved.moduleId || "",
        moduleName: p.get("moduleName") || saved.moduleName || "Module",
        chapterId: p.get("chapterId") || saved.chapterId || "",
        chapterTitle: p.get("chapterTitle") || saved.chapterTitle || "Chapter",
        chapterNumber: p.get("chapterNumber") || saved.chapterNumber || "",
        chapterIds: p.get("chapterIds") || saved.chapterIds || "",
        source: p.get("source") || saved.source || ""
      };
    }
    async function getToken(){ const { data } = await sb.auth.getSession(); return data?.session?.access_token || localStorage.getItem("supabase_token") || ""; }
    async function loadActivityLeaderboard(activityType, containerId){ const container=el(containerId); if(!container||!ctx.chapterId)return; try{ const token=await getToken(); const response=await fetch(`${API_BASE}/activity/leaderboard?activityType=${encodeURIComponent(activityType)}&chapterId=${encodeURIComponent(ctx.chapterId)}&limit=8`,{headers:{Authorization:`Bearer ${token}`}}); const data=await response.json(); const rows=data.leaderboard||[]; container.innerHTML=rows.length?rows.map(row=>`<div class="stat-row"><span>#${row.rank} ${escapeHtml(row.student_name)}</span><span>${row.score}/${(row.correct_count||0)+(row.incorrect_count||0)||row.score} (${Math.round(row.accuracy||0)}%)</span></div>`).join(""):`<div class="hint">No flashcard leaderboard scores yet.</div>`; }catch(error){ console.warn("Could not load flashcard leaderboard:",error); container.innerHTML=`<div class="hint">Leaderboard unavailable.</div>`; } }
    async function requireAuth(){
      const { data } = await sb.auth.getSession();
      if (!data?.session) { window.location.href = "login.html"; return false; }
      localStorage.setItem("supabase_token", data.session.access_token);
      return true;
    }
    function contextLabel(ctx){ return `${ctx.moduleName} ${ctx.chapterNumber ? `Chapter ${ctx.chapterNumber}: ` : ""}${ctx.chapterTitle}`.trim(); }
    function showMissingContext(){
      el("toolBody").innerHTML = `<div class="error-box"><strong>No chapter selected.</strong><br/>Go back to the main learning page, select a module and chapter, then open this tool again.</div>`;
    }
    function goBackToLearning(){
      try { localStorage.setItem("skillfind:selectedContext", JSON.stringify(ctx)); } catch {}
      const params = new URLSearchParams({ openChat: "1", ...ctx });
      window.location.href = `index.html?${params.toString()}`;
    }

    const ctx=getSavedContext(); let flashcardState={cards:[],currentIndex:0,isFlipped:false,settings:{cardCount:10}};
    function renderSettings(){ el("toolBody").innerHTML=`<div class="settings"><div class="setting-row"><span>Number of Flashcards</span><select id="flashcardCount"><option value="5">5 Cards</option><option value="10" selected>10 Cards</option><option value="15">15 Cards</option><option value="20">20 Cards</option></select></div><button class="start-btn" id="startFlashcardBtn">Start Studying</button><div class="tool-sub">Flashcards will be generated from your selected chapter content.</div><div class="panel" style="padding:14px;box-shadow:none;"><div class="section-title" style="margin-top:0;">Flashcard Leaderboard</div><div id="flashcardLeaderboard"><div class="hint">Loading leaderboard...</div></div></div></div>`; el("startFlashcardBtn").addEventListener("click",()=>{flashcardState.settings.cardCount=parseInt(el("flashcardCount").value,10);generateFlashcards();}); loadActivityLeaderboard("flashcard","flashcardLeaderboard"); }
    async function generateFlashcards(){ el("toolBody").innerHTML=`<div class="loading-spinner"><div class="spinner"></div><p>Generating flashcards...</p></div>`; try{ const token=await getToken(); const endpoint=ctx.source==="exam-practice"?"/exam-practice/flashcard/generate":"/flashcard/generate"; const response=await fetch(`${API_BASE}${endpoint}`,{method:"POST",headers:{"Content-Type":"application/json",Authorization:`Bearer ${token}`},body:JSON.stringify({moduleId:ctx.moduleId,chapterId:ctx.chapterId,chapterIds:ctx.chapterIds,chapterTitle:ctx.chapterTitle,cardCount:flashcardState.settings.cardCount})}); const data=await response.json(); flashcardState.cards=data.ok&&data.flashcards?.length?data.flashcards:generateMockFlashcards(ctx.chapterTitle,flashcardState.settings.cardCount); }catch(e){ console.error(e); flashcardState.cards=generateMockFlashcards(ctx.chapterTitle,flashcardState.settings.cardCount); } flashcardState.currentIndex=0; flashcardState.isFlipped=false; renderCurrentFlashcard(); }
    function generateMockFlashcards(chapter,count){ const cards=[{id:"0",term:`What is the main purpose of ${chapter || "this chapter"}?`,definition:"To develop practical skills and real-world understanding.",known:false},{id:"1",term:"Why are hands-on exercises important?",definition:"They reinforce learning and help apply theoretical knowledge.",known:false},{id:"2",term:"How does this chapter prepare you for your career?",definition:"By teaching industry-relevant skills and problem-solving techniques.",known:false},{id:"3",term:"What is a key skill developed in this chapter?",definition:"Critical thinking and practical application of concepts.",known:false},{id:"4",term:"How should you review this material?",definition:"Use active recall, examples, and regular self-testing.",known:false}]; return cards.slice(0,Math.min(count,cards.length)); }
    function renderCurrentFlashcard(){ const card=flashcardState.cards[flashcardState.currentIndex]; const progress=((flashcardState.currentIndex+1)/flashcardState.cards.length)*100; el("toolBody").innerHTML=`<div><div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div><div class="question-counter">Card ${flashcardState.currentIndex+1} of ${flashcardState.cards.length}</div><div class="flashcard-container"><div class="flashcard ${flashcardState.isFlipped?"flipped":""}" id="flashcard"><div class="flashcard-front"><div><div class="flashcard-label">📖 Term / Question</div><div class="flashcard-content">${escapeHtml(card.term)}</div><div class="flashcard-hint">Click to flip</div></div></div><div class="flashcard-back"><div><div class="flashcard-label">💡 Definition / Answer</div><div class="flashcard-content">${escapeHtml(card.definition)}</div><div class="flashcard-hint">Click to flip back</div></div></div></div></div><div class="flashcard-actions"><button class="flashcard-btn" id="markKnownBtn">✅ I Know This</button><button class="flashcard-btn" id="markUnknownBtn">🔄 Still Learning</button></div><div class="quiz-nav"><button class="nav-btn" id="prevBtn" ${flashcardState.currentIndex===0?"disabled":""}>← Previous</button><button class="nav-btn" id="nextBtn">Next →</button></div></div>`; el("flashcard")?.addEventListener("click",()=>{flashcardState.isFlipped=!flashcardState.isFlipped;renderCurrentFlashcard();}); el("markKnownBtn")?.addEventListener("click",()=>markProgress(true)); el("markUnknownBtn")?.addEventListener("click",()=>markProgress(false)); el("prevBtn")?.addEventListener("click",()=>{if(flashcardState.currentIndex>0){flashcardState.currentIndex--;flashcardState.isFlipped=false;renderCurrentFlashcard();}}); el("nextBtn")?.addEventListener("click",()=>{if(flashcardState.currentIndex<flashcardState.cards.length-1){flashcardState.currentIndex++;flashcardState.isFlipped=false;renderCurrentFlashcard();}else showResults();}); }
    async function saveFlashcardProgress(cardId,known){ try{ const token=await getToken(); if(!token)return; await fetch(`${API_BASE}/flashcard/progress`,{method:"POST",headers:{"Content-Type":"application/json",Authorization:`Bearer ${token}`},body:JSON.stringify({chapterId:ctx.chapterId,cardId,known})}); }catch(e){console.error(e);} }
    async function markProgress(known){ const card=flashcardState.cards[flashcardState.currentIndex]; card.known=known; await saveFlashcardProgress(card.id,known); if(flashcardState.currentIndex<flashcardState.cards.length-1){flashcardState.currentIndex++;flashcardState.isFlipped=false;renderCurrentFlashcard();}else showResults(); }
    async function saveFlashcardAttempt(known,pct){ try{ const token=await getToken(); if(!token)return; const answers=flashcardState.cards.map(card=>({questionId:null,questionText:card.term,topicTags:[ctx.chapterTitle||"General"],selectedAnswer:card.known?"Known":"Still Learning",correctAnswer:card.definition,isCorrect:Boolean(card.known)})); await fetch(`${API_BASE}/activity/attempts`,{method:"POST",headers:{"Content-Type":"application/json",Authorization:`Bearer ${token}`},body:JSON.stringify({activityType:"flashcard",moduleId:ctx.moduleId,chapterId:ctx.chapterId,score:known,maxScore:flashcardState.cards.length,accuracy:pct,correctCount:known,incorrectCount:flashcardState.cards.length-known,participationCount:flashcardState.cards.length,metadata:{chapterTitle:ctx.chapterTitle},answers})}); }catch(error){ console.warn("Could not save flashcard leaderboard attempt:",error); } }
    function showResults(){ const known=flashcardState.cards.filter(c=>c.known).length; const pct=Math.round((known/flashcardState.cards.length)*100); saveFlashcardAttempt(known,pct); const msg=pct>=80?"Excellent!":pct>=60?"Good progress!":"Keep practicing!"; el("toolBody").innerHTML=`<div class="results-area"><div class="score-circle"><div><div class="score-number">${known}/${flashcardState.cards.length}</div><div class="score-label">Known</div></div></div><div style="font-size:18px;font-weight:800">${msg}</div><div class="results-stats"><div class="stat-row"><span>Cards Known:</span><span>${known}</span></div><div class="stat-row"><span>Still Learning:</span><span>${flashcardState.cards.length-known}</span></div><div class="stat-row"><span>Mastery:</span><span>${pct}%</span></div></div><div class="panel" style="padding:14px;box-shadow:none;margin-top:20px;text-align:left;"><div class="section-title" style="margin-top:0;">Flashcard Leaderboard</div><div id="flashcardResultsLeaderboard"><div class="hint">Updating leaderboard...</div></div></div><button class="restart-btn primary" onclick="renderSettings()">Study Again</button></div>`; setTimeout(()=>loadActivityLeaderboard("flashcard","flashcardResultsLeaderboard"),700); }
    (async function init(){ if(!(await requireAuth())) return; el("contextLine").textContent=contextLabel(ctx); if(!ctx.chapterId)return showMissingContext(); renderSettings(); })();
  </script>
</body></html>
